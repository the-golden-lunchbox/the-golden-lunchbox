<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs for Community Logging -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Firebase Config (Provided by environment)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'the-golden-lunchbox';

        window.fb = { db, auth, collection, addDoc, onSnapshot, query, serverTimestamp, signInAnonymously, onAuthStateChanged, appId };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FCF9F1; color: #451a03; -webkit-tap-highlight-color: transparent; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconLunchbox = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="12" rx="4" /><path d="M7 8V6a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v2" /><line x1="3" y1="14" x2="21" y2="14" /></svg>
        );
        const IconCheck = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
        );
        const IconBook = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );
        const IconTrash = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        );
        const IconMapPin = () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const IconPlus = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('fridge');
            const [inventory, setInventory] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [sheetSales, setSheetSales] = useState([]);
            const [communitySales, setCommunitySales] = useState([]);
            const [loading, setLoading] = useState(false);
            const [user, setUser] = useState(null);
            
            // For the Community Deal Form
            const [showDealForm, setShowDealForm] = useState(false);
            const [newDeal, setNewDeal] = useState({ item: '', where: '', tip: '' });

            const RECIPES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";
            const SALES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=1391603013&single=true&output=csv";

            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    if (char === '"' && inQuotes && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                        currentRow = []; currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                const headers = (rows[0] || []).map(h => h.trim());
                return rows.slice(1).map(row => headers.reduce((obj, header, i) => { obj[header] = row[i]; return obj; }, {}));
            };

            const fetchSheetData = async () => {
                setLoading(true);
                try {
                    const resR = await fetch(RECIPES_CSV);
                    const textR = await resR.text();
                    setRecipes(parseCSV(textR).map(r => ({
                        id: r.ID || Math.random(),
                        title: r.Title || "Recipe",
                        tags: (r.Tags || "Golden").split('|').map(t => t.trim()),
                        instructions: r.Recipes || "No instructions.",
                        time: r.Efforts || "15m",
                        image: r.Image || r.Picture || r.Photo,
                        where: r.Where || r.Location
                    })));

                    const resS = await fetch(SALES_CSV);
                    const textS = await resS.text();
                    setSheetSales(parseCSV(textS).filter(s => String(s.Active).toUpperCase() === 'TRUE').map(s => ({
                        item: s['Item Name'] || s.Item,
                        status: s.Status || 'Pro Deal',
                        tip: s.Tip || s.Note,
                        where: s.Where || s.Location,
                        image: s.Image || s.Picture,
                        id: s.ID || Math.random()
                    })));
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            useEffect(() => {
                const saved = localStorage.getItem('golden-lunchbox-data');
                if (saved) setInventory(JSON.parse(saved));
                fetchSheetData();

                // Wait for Firebase to load
                const interval = setInterval(() => {
                    if (window.fb) {
                        clearInterval(interval);
                        const { auth, signInAnonymously, onAuthStateChanged, db, collection, query, onSnapshot, appId } = window.fb;
                        
                        signInAnonymously(auth).catch(console.error);
                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if (u) {
                                // Listen to Community Deals
                                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'user_sales'));
                                onSnapshot(q, (snapshot) => {
                                    const deals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                    setCommunitySales(deals);
                                });
                            }
                        });
                    }
                }, 100);
            }, []);

            const submitCommunityDeal = async () => {
                if (!user || !newDeal.item || !newDeal.where) return;
                const { db, collection, addDoc, serverTimestamp, appId } = window.fb;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'user_sales'), {
                        item: newDeal.item,
                        where: newDeal.where,
                        tip: newDeal.tip,
                        status: 'Community Spot',
                        timestamp: serverTimestamp(),
                        userId: user.uid
                    });
                    setNewDeal({ item: '', where: '', tip: '' });
                    setShowDealForm(false);
                } catch (e) { console.error(e); }
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-white border-b border-amber-200 sticky top-0 z-50 px-6 py-6 shadow-sm">
                        <div className="max-w-2xl mx-auto flex justify-between items-center text-center px-4">
                            <h1 className="text-xl font-black text-amber-600 tracking-tighter uppercase leading-none flex items-center gap-2">
                                <IconLunchbox /> THE GOLDEN LUNCHBOX
                            </h1>
                            <div className="bg-amber-500 text-white p-2 rounded-xl shadow-lg cursor-pointer active:scale-95 transition-transform" onClick={fetchSheetData}>
                                <IconCheck />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-5 space-y-8">
                        {activeTab === 'fridge' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-amber-100">
                                    <label className="block text-[10px] font-black text-amber-700 uppercase mb-4 tracking-widest px-1 italic">Log Discovery</label>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input 
                                            type="text" 
                                            placeholder="What's expiring? (e.g. Yams)"
                                            className="flex-1 bg-neutral-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border-2 border-amber-100 focus:border-amber-500 text-neutral-800 shadow-inner"
                                            value={newDeal.item} // reusing state just for demo/simplicity
                                            onChange={e => setNewDeal({...newDeal, item: e.target.value})}
                                        />
                                        <button className="bg-amber-500 text-white font-black py-4 px-8 rounded-2xl shadow-lg uppercase text-[11px] tracking-widest active:scale-95 transition-transform">
                                            Log
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipes' && (
                            <div className="space-y-6 animate-fade">
                                {recipes.map(recipe => (
                                    <div key={recipe.id} className="bg-white rounded-[3rem] border border-amber-50 shadow-sm overflow-hidden group">
                                        {recipe.image && <img src={recipe.image} className="w-full h-48 object-cover border-b border-amber-50" />}
                                        <div className="p-8">
                                            <div className="flex gap-2 mb-4 items-center justify-between">
                                                <div className="flex gap-2">
                                                    {recipe.tags.map(tag => <span key={tag} className="text-[9px] bg-amber-50 text-amber-600 px-3 py-1 rounded-full font-black uppercase tracking-tighter">{tag}</span>)}
                                                </div>
                                            </div>
                                            <h3 className="font-black text-xl text-neutral-800 leading-tight group-hover:text-amber-500 transition-colors">{recipe.title}</h3>
                                            <p className="text-neutral-500 text-sm mt-4 leading-relaxed font-medium italic">"{recipe.instructions}"</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'sales' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-amber-500 p-8 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden flex flex-col items-center">
                                    <h2 className="text-3xl font-black italic tracking-tighter uppercase leading-none mb-4">Sale Radar</h2>
                                    <button 
                                        onClick={() => setShowDealForm(!showDealForm)}
                                        className="bg-white text-amber-500 px-6 py-3 rounded-2xl font-black text-xs shadow-lg uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all"
                                    >
                                        <IconPlus /> Log a Spot
                                    </button>
                                </div>

                                {showDealForm && (
                                    <div className="bg-amber-50 p-8 rounded-[2.5rem] border-2 border-amber-200 shadow-inner animate-fade space-y-4">
                                        <p className="text-xs font-black uppercase text-amber-700 tracking-widest text-center">Spotted a deal? Share it!</p>
                                        <input 
                                            type="text" placeholder="Item (e.g. 2-for-1 Yams)" 
                                            className="w-full bg-white rounded-xl px-4 py-3 text-sm font-bold border-2 border-amber-100 outline-none focus:border-amber-500"
                                            value={newDeal.item} onChange={e => setNewDeal({...newDeal, item: e.target.value})}
                                        />
                                        <input 
                                            type="text" placeholder="Where? (e.g. Local Market)" 
                                            className="w-full bg-white rounded-xl px-4 py-3 text-sm font-bold border-2 border-amber-100 outline-none focus:border-amber-500"
                                            value={newDeal.where} onChange={e => setNewDeal({...newDeal, where: e.target.value})}
                                        />
                                        <textarea 
                                            placeholder="Tip/Note..." 
                                            className="w-full bg-white rounded-xl px-4 py-3 text-sm font-bold border-2 border-amber-100 outline-none focus:border-amber-500 h-20"
                                            value={newDeal.tip} onChange={e => setNewDeal({...newDeal, tip: e.target.value})}
                                        />
                                        <button 
                                            onClick={submitCommunityDeal}
                                            className="w-full bg-amber-500 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-amber-600 transition-colors"
                                        >
                                            Post to Radar
                                        </button>
                                    </div>
                                )}

                                {/* Pro Deals from Sheet */}
                                {sheetSales.map(sale => (
                                    <div key={sale.id} className="bg-white rounded-[2.5rem] border-2 border-amber-100 shadow-sm overflow-hidden flex flex-col">
                                        <div className="p-8">
                                            <div className="flex items-center gap-2 mb-1">
                                                <p className="text-amber-600 text-[10px] font-black uppercase tracking-widest">OFFICIAL PRO DEAL</p>
                                                {sale.where && <p className="text-[10px] font-black text-amber-400 uppercase italic"><IconMapPin /> {sale.where}</p>}
                                            </div>
                                            <h3 className="text-2xl font-black uppercase tracking-tighter text-neutral-800">{sale.item}</h3>
                                            <p className="text-neutral-500 text-sm italic mt-2 font-medium">"{sale.tip}"</p>
                                        </div>
                                    </div>
                                ))}

                                {/* Community Deals from Cloud */}
                                {communitySales.map(sale => (
                                    <div key={sale.id} className="bg-white/60 rounded-[2.5rem] border border-dashed border-amber-200 p-8 flex flex-col animate-fade">
                                        <div className="flex items-center gap-2 mb-1">
                                            <p className="text-amber-400 text-[10px] font-black uppercase tracking-widest">COMMUNITY SPOT</p>
                                            <p className="text-[10px] font-black text-amber-300 uppercase italic"><IconMapPin /> {sale.where}</p>
                                        </div>
                                        <h3 className="text-xl font-black uppercase tracking-tighter text-neutral-700">{sale.item}</h3>
                                        <p className="text-neutral-400 text-xs italic mt-2 font-medium">"{sale.tip}"</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-2xl border border-amber-100 p-3 flex gap-2 rounded-[2.8rem] shadow-2xl z-[100] ring-8 ring-amber-500/5">
                        <button onClick={() => setActiveTab('fridge')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all ${activeTab === 'fridge' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300'}`}>
                            <IconCheck />{activeTab === 'fridge' && <span className="font-black text-[10px] tracking-widest uppercase">Rescue</span>}
                        </button>
                        <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all ${activeTab === 'recipes' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300'}`}>
                            <IconBook />{activeTab === 'recipes' && <span className="font-black text-[10px] tracking-widest uppercase font-black">Library</span>}
                        </button>
                        <button onClick={() => setActiveTab('sales')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all ${activeTab === 'sales' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300'}`}>
                            <IconLunchbox />{activeTab === 'sales' && <span className="font-black text-[10px] tracking-widest uppercase font-black leading-none">Sales</span>}
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
