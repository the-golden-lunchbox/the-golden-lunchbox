<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox | Family & Boutique</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Tailwind & React/Babel from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FDFBFA; 
            color: #2D241E;
            -webkit-tap-highlight-color: transparent; 
        }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        /* 🖼️ SMART FRAME SYSTEM (Hides Watermarks) */
        .recipe-image-container {
            position: relative;
            width: 100%;
            height: 350px;
            overflow: hidden;
            border-radius: 2.5rem 2.5rem 0 0;
            background: #EFE9E4;
        }

        .recipe-image {
            width: 100%;
            height: 118%; /* Pushes bottom watermark out of frame */
            object-fit: cover;
            object-position: center top; 
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recipe-card:hover .recipe-image { transform: scale(1.05); }

        /* 🧾 RECEIPT STYLE (Zig-Zag Edge) */
        .receipt-card {
            background: white;
            border: 1px solid #eee;
            position: relative;
        }
        .receipt-card::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: linear-gradient(-45deg, transparent 5px, white 5px), linear-gradient(45deg, transparent 5px, white 5px);
            background-size: 10px 10px;
        }

        .instruction-text { white-space: pre-line; word-wrap: break-word; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .animate-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SVGs ---
        const IconKitchen = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconBook = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconBoutique = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const IconRadar = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M12 12l4 4"/></svg>;
        const IconSearch = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconHeart = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
        const IconSparkles = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97706" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.912 5.813L21 10.725l-5.813 1.912L12 21l-1.912-5.813L3 13.275l5.813-1.912L12 3z"/></svg>;
        const IconExternal = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconPlus = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [searchQuery, setSearchQuery] = useState('');
            const [userRecipes, setUserRecipes] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showAddRecipe, setShowAddRecipe] = useState(false);
            const [newRecipe, setNewRecipe] = useState({ title: '', instructions: '', secret: '', forKids: false });

            const RECIPES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";
            const SALES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_-MLitKb9cTRAD5rtiw9Vi9MscUEPIIQG7wKIPpzUI8AwYI84tuz3NVtez-6z6xjFG6ZySgRYClQg/pub?output=csv";

            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (char === '"' && text[i + 1] === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                        currentRow = []; currentField = '';
                        if (char === '\r' && text[i + 1] === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                const headers = (rows[0] || []).map(h => h.trim().toLowerCase());
                return rows.slice(1).map(row => headers.reduce((obj, header, i) => { obj[header] = row[i]; return obj; }, {}));
            };

            const syncData = async () => {
                setLoading(true);
                try {
                    const [resR, resS] = await Promise.all([fetch(RECIPES_URL), fetch(SALES_URL)]);
                    const [textR, textS] = await Promise.all([resR.text(), resS.text()]);
                    setRecipes(parseCSV(textR).map(r => ({
                        title: r.title || r.name,
                        info: r.recipes || r.instructions || r.info,
                        image: r.image || r.photo,
                        secret: r.secret || r.tip || "",
                        shop: r.amazon || r.shoplink || "",
                        tags: (r.tags || "Rescue").split('|')
                    })));
                    setSales(parseCSV(textS).map(s => ({
                        item: s.item || s.name,
                        location: s.location || s.where,
                        tip: s.tip || s.note
                    })));
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            useEffect(() => {
                const saved = localStorage.getItem('gl-html-final-v1');
                if (saved) setUserRecipes(JSON.parse(saved));
                syncData();
            }, []);

            const addCustomRecipe = () => {
                if (!newRecipe.title.trim()) return;
                const updated = [...userRecipes, { ...newRecipe, id: Date.now(), date: new Date().toLocaleDateString('en-GB') }];
                setUserRecipes(updated);
                localStorage.setItem('gl-html-final-v1', JSON.stringify(updated));
                setNewRecipe({ title: '', instructions: '', secret: '', forKids: false });
                setShowAddRecipe(false);
            };

            const filteredRecipes = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return recipes.filter(r => r.title?.toLowerCase().includes(q) || r.info?.toLowerCase().includes(q));
            }, [recipes, searchQuery]);

            return (
                <div className="min-h-screen pb-40">
                    <header className="sticky top-0 z-[60] bg-[#FDFBFA]/90 backdrop-blur-md border-b border-stone-100 p-6 px-8">
                        <div className="max-w-2xl mx-auto space-y-4">
                            <div className="flex justify-between items-center">
                                <h1 className="text-3xl font-black text-amber-600 tracking-tighter uppercase leading-none italic">Golden<br/>Lunchbox</h1>
                                <div className="text-right"><span className="text-[9px] font-black bg-stone-100 px-3 py-1 rounded-full uppercase tracking-widest text-stone-400">Kitchen Live</span></div>
                            </div>
                            {(activeTab === 'library' || activeTab === 'kitchen') && (
                                <div className="relative">
                                    <div className="absolute left-5 top-1/2 -translate-y-1/2 text-stone-300"><IconSearch /></div>
                                    <input type="text" placeholder="Search budget harvest..." className="w-full bg-stone-100/50 border border-stone-100 rounded-2xl py-4 pl-14 pr-6 font-bold text-sm outline-none focus:ring-2 focus:ring-amber-500/20 focus:bg-white" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 pt-10 space-y-12">
                        {activeTab === 'kitchen' && (
                            <div className="animate-up space-y-10">
                                <div className="bg-stone-900 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                    <h2 className="text-3xl font-bold italic mb-1">My Legacy</h2>
                                    <p className="text-stone-400 text-xs mb-8 italic">Drafting wins for the family kitchen.</p>
                                    <button onClick={() => setShowAddRecipe(!showAddRecipe)} className="bg-amber-600 text-white w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 text-xs uppercase tracking-widest transition-all">
                                        <IconPlus /> {showAddRecipe ? "Hide Draft" : "Add Private Recipe"}
                                    </button>
                                </div>

                                {showAddRecipe && (
                                    <div className="bg-white p-8 rounded-[3.5rem] shadow-xl border border-stone-100 space-y-6 animate-up">
                                        <input className="w-full bg-stone-50 p-5 rounded-2xl outline-none font-bold" placeholder="Recipe Title" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} />
                                        <textarea className="w-full bg-stone-50 p-6 rounded-3xl outline-none h-48 text-sm" placeholder="Method..." value={newRecipe.instructions} onChange={e => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                                        <input className="w-full bg-amber-50 p-4 rounded-xl border border-amber-100 outline-none font-medium text-sm italic" placeholder="The Curator's Secret (Budget hack...)" value={newRecipe.secret} onChange={e => setNewRecipe({...newRecipe, secret: e.target.value})} />
                                        <label className="flex items-center gap-3 p-4 bg-stone-50 rounded-2xl cursor-pointer">
                                            <input type="checkbox" className="w-5 h-5 accent-amber-600" checked={newRecipe.forKids} onChange={(e) => setNewRecipe({...newRecipe, forKids: e.target.checked})} />
                                            <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest flex items-center gap-2"><IconHeart /> Kid's Favorite Choice</span>
                                        </label>
                                        <button onClick={addCustomRecipe} className="w-full bg-stone-900 text-white py-5 rounded-3xl font-black uppercase text-[10px] tracking-widest shadow-lg">Save to My Legacy</button>
                                    </div>
                                )}

                                <div className="grid gap-10">
                                    {userRecipes.map(r => (
                                        <div key={r.id} className="receipt-card p-10 rounded-t-[3rem] shadow-sm animate-up bg-white border-stone-100 group">
                                            <div className="flex justify-between items-start mb-8">
                                                <div>
                                                    <div className="flex items-center gap-3 mb-1">
                                                        <span className="text-[8px] font-black uppercase tracking-widest text-amber-500">{r.date}</span>
                                                        {r.forKids && <span className="flex items-center gap-1 text-[8px] font-black text-red-500 uppercase tracking-widest bg-red-50 px-2 py-0.5 rounded-full"><IconHeart /> Kids Choice</span>}
                                                    </div>
                                                    <h4 className="text-3xl font-bold italic mt-1 leading-none">{r.title}</h4>
                                                </div>
                                                <button onClick={() => {const u = userRecipes.filter(x => x.id !== r.id); setUserRecipes(u); localStorage.setItem('gl-html-final-v1', JSON.stringify(u));}} className="p-2 text-stone-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"><IconTrash /></button>
                                            </div>
                                            <div className="space-y-6">
                                                <p className="instruction-text text-stone-600 text-base leading-relaxed italic opacity-95">"{r.instructions}"</p>
                                                {r.secret && <div className="bg-amber-50 p-6 rounded-2xl border border-amber-100 h6 text-[9px] font-black text-amber-600 uppercase tracking-widest mb-2 italic flex items-center gap-1.5"><IconSparkles /> The Secret: <span className="text-amber-900/80 font-semibold lowercase">"{r.secret}"</span></div>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'library' && (
                            <div className="animate-up space-y-12">
                                {filteredRecipes.length > 0 ? filteredRecipes.map((r, i) => (
                                    <div key={i} className="recipe-card bg-white rounded-[4rem] shadow-sm overflow-hidden border border-stone-100 group">
                                        <div className="recipe-image-container">
                                            {r.image && <img src={r.image} alt={r.title} className="recipe-image" />}
                                        </div>
                                        <div className="p-12">
                                            <div className="flex gap-2 mb-6">{r.tags.map(t => <span key={t} className="text-[10px] bg-stone-50 text-stone-400 px-4 py-1.5 rounded-full font-black uppercase tracking-widest border border-stone-100 italic">#{t}</span>)}</div>
                                            <h3 className="text-4xl font-black text-stone-800 mb-8 leading-[1.1]">{r.title}</h3>
                                            <div className="bg-stone-50 p-10 rounded-[3rem] border border-stone-100 shadow-inner mb-8">
                                                <p className="instruction-text text-stone-600 text-lg leading-relaxed italic font-medium">"{r.info}"</p>
                                            </div>
                                            {r.secret && (
                                                <div className="bg-amber-600 p-10 rounded-[3rem] text-white shadow-xl shadow-amber-900/10 relative overflow-hidden">
                                                    <h6 className="text-[10px] font-black text-amber-200 uppercase tracking-widest mb-4 flex items-center gap-2 italic"><IconSparkles /> The Curator's Secret</h6>
                                                    <p className="text-xl font-bold italic leading-tight">"{r.secret}"</p>
                                                </div>
                                            )}
                                            {r.shop && <a href={r.shop} target="_blank" className="inline-flex items-center gap-2 mt-8 px-6 py-3 bg-stone-900 text-white rounded-full text-[9px] font-black uppercase tracking-widest shadow-lg"><IconExternal /> Shop Essentials</a>}
                                        </div>
                                    </div>
                                )) : <div className="text-center py-32 opacity-20 italic font-bold text-stone-300">Harvest Empty...</div>}
                            </div>
                        )}

                        {activeTab === 'radar' && (
                            <div className="animate-up space-y-10">
                                <div className="p-12 rounded-[4rem] bg-stone-900 text-white text-center shadow-2xl relative"><h2 className="text-4xl font-black italic tracking-tighter uppercase leading-none">Budget Radar</h2><p className="text-amber-400 text-[10px] font-black uppercase tracking-widest mt-4 italic">Neighborhood Watch</p></div>
                                {sales.map((s, i) => (
                                    <div key={i} className="bg-white rounded-[3.5rem] border border-stone-50 shadow-sm overflow-hidden p-12 animate-up">
                                        <div className="flex justify-between items-center mb-6"><span className="text-[10px] font-black text-amber-600 uppercase tracking-widest bg-amber-50 px-4 py-1.5 rounded-full italic">Market Live</span><span className="text-[11px] font-black text-stone-400 uppercase italic flex items-center">📍 {s.location || 'Local'}</span></div>
                                        <h3 className="text-3xl font-black text-stone-800 leading-none tracking-tight">{s.item}</h3>
                                        <p className="instruction-text text-stone-500 text-base leading-relaxed italic border-t border-stone-50 pt-10 mt-6">"{s.tip}"</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'boutique' && (
                            <div className="animate-up space-y-12">
                                <div className="text-center space-y-6">
                                    <h2 className="text-5xl font-black italic">Boutique</h2>
                                    <p className="text-stone-400 text-[10px] uppercase tracking-[0.6em] font-black italic">Premium Over Price</p>
                                    <div className="max-w-sm mx-auto p-10 bg-amber-50 rounded-[3rem] border border-amber-100 shadow-sm text-center">
                                        <p className="text-[13px] text-amber-900 italic leading-relaxed font-bold">"I build luxury lifestyles for families on budgets. We start with a forgotten old squash and we build a golden legacy."</p>
                                    </div>
                                </div>
                                <div className="grid gap-8">
                                    <div className="bg-white p-12 rounded-[4rem] border border-stone-100 shadow-sm hover:border-amber-200 transition-all active:scale-98 group">
                                        <div className="flex items-center justify-between mb-8"><h3 className="text-3xl font-black text-stone-800 italic group-hover:text-amber-600">VIP Subscription</h3><span className="text-[9px] bg-amber-600 text-white px-4 py-2 rounded-full font-black uppercase tracking-widest">Join Club</span></div>
                                        <p className="text-stone-500 text-base mb-10 font-medium leading-relaxed italic">"Unlock my private weekly budget plans and full library of secret harvest hacks."</p>
                                        <button className="w-full bg-stone-900 text-white py-6 rounded-[2.5rem] font-black uppercase text-[10px] tracking-widest shadow-xl">Subscribe for $9/mo</button>
                                    </div>
                                    <div className="bg-stone-900 p-12 rounded-[4rem] shadow-2xl relative overflow-hidden group active:scale-98 transition-all">
                                        <div className="relative z-10">
                                            <div className="flex items-center justify-between mb-8"><h3 className="text-3xl font-black text-white italic">App Architecture</h3><span className="text-[9px] bg-amber-600 text-white px-4 py-2 rounded-full font-black uppercase tracking-widest">For Creators</span></div>
                                            <p className="text-stone-300 text-base mb-10 font-medium leading-relaxed italic">"Own the exact code for this app and launch your own food brand for your followers."</p>
                                            <button className="w-full bg-white text-stone-900 py-6 rounded-[2.5rem] font-black uppercase text-[10px] tracking-widest">Purchase Template</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 nav-glass p-3 flex gap-4 rounded-[3.5rem] shadow-[0_25px_50px_rgba(0,0,0,0.15)] z-[100] border-2 border-white">
                        <button onClick={() => setActiveTab('kitchen')} className={`flex items-center justify-center w-14 h-14 rounded-full transition-all duration-500 ${activeTab === 'kitchen' ? 'bg-amber-600 text-white shadow-xl scale-110' : 'text-stone-300'}`}><IconKitchen /></button>
                        <button onClick={() => setActiveTab('library')} className={`flex items-center justify-center w-14 h-14 rounded-full transition-all duration-500 ${activeTab === 'library' ? 'bg-amber-600 text-white shadow-xl scale-110' : 'text-stone-300'}`}><IconBook /></button>
                        <button onClick={() => setActiveTab('radar')} className={`flex items-center justify-center w-14 h-14 rounded-full transition-all duration-500 ${activeTab === 'radar' ? 'bg-amber-600 text-white shadow-xl scale-110' : 'text-stone-300'}`}><IconRadar /></button>
                        <button onClick={() => setActiveTab('boutique')} className={`flex items-center justify-center w-14 h-14 rounded-full transition-all duration-500 ${activeTab === 'boutique' ? 'bg-amber-600 text-white shadow-xl scale-110' : 'text-stone-300'}`}><IconBoutique /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
