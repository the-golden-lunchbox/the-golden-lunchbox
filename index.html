<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for the app logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FCF9F1; 
            color: #451a03; 
            -webkit-tap-highlight-color: transparent; 
        }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PREMIUM GOLDEN ICONS ---
        const IconLunchbox = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="12" rx="4" /><path d="M7 8V6a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v2" /><line x1="3" y1="14" x2="21" y2="14" /></svg>
        );
        const IconCheck = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
        );
        const IconBook = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );
        const IconTrash = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        );
        const IconMapPin = () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-1"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('fridge');
            const [inventory, setInventory] = useState([]);
            const [newItem, setNewItem] = useState({ name: '', days: 3 });
            const [recipes, setRecipes] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(false);

            // --- LIVE GOOGLE SHEET CSV LINKS ---
            const RECIPES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";
            const SALES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=1391603013&single=true&output=csv";

            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    if (char === '"' && inQuotes && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                        currentRow = []; currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                const headers = (rows[0] || []).map(h => h.trim());
                return rows.slice(1).map(row => headers.reduce((obj, header, i) => { 
                    obj[header] = row[i]; 
                    return obj; 
                }, {}));
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    // Fetch Recipes
                    const resR = await fetch(RECIPES_CSV);
                    const textR = await resR.text();
                    const recipeData = parseCSV(textR);
                    setRecipes(recipeData.map(r => {
                        const find = (names) => {
                            const key = Object.keys(r).find(k => names.includes(k.toLowerCase().trim()));
                            return key ? r[key] : "";
                        };
                        return {
                            id: find(['id']) || Math.random(),
                            title: find(['title', 'name']) || "New Recipe",
                            tags: (find(['tags', 'type']) || "Golden").split('|').map(t => t.trim()),
                            instructions: find(['recipes', 'instructions', 'method']) || "No instructions.",
                            time: find(['efforts', 'time']) || "15m",
                            where: find(['where', 'location', 'store'])
                        };
                    }));

                    // Fetch Sales
                    if (SALES_CSV) {
                        const resS = await fetch(SALES_CSV);
                        const textS = await resS.text();
                        const rawSales = parseCSV(textS);
                        
                        const processedSales = rawSales.filter(s => {
                            const activeKey = Object.keys(s).find(k => k.toLowerCase() === 'active');
                            return String(s[activeKey]).toUpperCase() === 'TRUE';
                        }).map(s => {
                            const find = (names) => {
                                const key = Object.keys(s).find(k => names.includes(k.toLowerCase().trim()));
                                return key ? s[key] : "";
                            };
                            return {
                                item: find(['item name', 'item', 'name']),
                                status: find(['status', 'deal']),
                                tip: find(['tip', 'info', 'note']),
                                where: find(['where', 'location', 'store']),
                                id: find(['id']) || Math.random()
                            };
                        });
                        setSales(processedSales);
                    }
                } catch (e) { 
                    console.error("Fetch Error:", e); 
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                const saved = localStorage.getItem('golden-lunchbox-data');
                if (saved) setInventory(JSON.parse(saved));
                fetchData();
            }, []);

            const addItem = () => {
                if (!newItem.name.trim()) return;
                const updated = [{ ...newItem, id: Date.now() }, ...inventory];
                setInventory(updated);
                localStorage.setItem('golden-lunchbox-data', JSON.stringify(updated));
                setNewItem({ name: '', days: 3 });
            };

            const deleteItem = (id) => {
                const updated = inventory.filter(i => i.id !== id);
                setInventory(updated);
                localStorage.setItem('golden-lunchbox-data', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-white border-b border-amber-200 sticky top-0 z-50 px-6 py-6 shadow-sm">
                        <div className="max-w-2xl mx-auto flex justify-between items-center text-center">
                            <h1 className="text-xl font-black text-amber-600 tracking-tighter uppercase leading-none flex items-center gap-2">
                                <IconLunchbox /> THE GOLDEN LUNCHBOX
                            </h1>
                            <div className="bg-amber-500 text-white p-2 rounded-xl shadow-lg cursor-pointer active:scale-95 transition-transform" onClick={fetchData}>
                                <IconCheck />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-5 space-y-8">
                        {activeTab === 'fridge' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-amber-100">
                                    <label className="block text-[10px] font-black text-amber-700 uppercase mb-4 tracking-widest px-1 italic">Log Fridge Discovery</label>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input 
                                            type="text" 
                                            placeholder="What did you buy? (e.g. Yams)"
                                            className="flex-1 bg-neutral-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border-2 border-amber-100 focus:border-amber-500 transition-all text-neutral-800 shadow-inner"
                                            value={newItem.name}
                                            onChange={e => setNewItem({...newItem, name: e.target.value})}
                                            onKeyPress={e => e.key === 'Enter' && addItem()}
                                        />
                                        <button onClick={addItem} className="bg-amber-500 text-white font-black py-4 px-8 rounded-2xl shadow-lg flex items-center justify-center gap-2 uppercase text-[11px] tracking-widest active:scale-95 transition-transform">
                                            Log
                                        </button>
                                    </div>
                                </div>
                                <div className="grid gap-3">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-[2.2rem] flex items-center justify-between border border-amber-50 shadow-sm animate-fade">
                                            <div className="flex items-center gap-4">
                                                <div className="w-1.5 h-10 rounded-full bg-gradient-to-b from-amber-400 to-amber-600 shadow-sm"></div>
                                                <p className="font-black text-neutral-800 text-base leading-none">{item.name}</p>
                                            </div>
                                            <button onClick={() => deleteItem(item.id)} className="p-2.5 text-neutral-300 hover:text-red-500 transition-colors"><IconTrash /></button>
                                        </div>
                                    ))}
                                    {inventory.length === 0 && (
                                        <div className="py-20 text-center border-2 border-dashed border-neutral-200 rounded-[3rem] opacity-30">
                                            <p className="text-neutral-400 font-bold text-sm uppercase tracking-widest italic">Your fridge is empty</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipes' && (
                            <div className="space-y-6 animate-fade">
                                {loading ? (
                                    <div className="py-20 text-center font-black text-amber-300 animate-pulse uppercase tracking-widest italic">Syncing Recipes...</div>
                                ) : (
                                    recipes.map(recipe => (
                                        <div key={recipe.id} className="bg-white p-8 rounded-[3rem] border border-amber-50 shadow-sm hover:shadow-lg transition-shadow relative overflow-hidden group">
                                            <div className="flex gap-2 mb-4 items-center justify-between">
                                                <div className="flex gap-2">
                                                    {recipe.tags.map(tag => <span key={tag} className="text-[9px] bg-amber-50 text-amber-600 px-3 py-1 rounded-full font-black uppercase tracking-tighter">{tag}</span>)}
                                                </div>
                                                {recipe.where && (
                                                    <span className="text-[10px] font-black uppercase text-amber-400 flex items-center gap-1 italic">
                                                        <IconMapPin /> {recipe.where}
                                                    </span>
                                                )}
                                            </div>
                                            <h3 className="font-black text-xl text-neutral-800 leading-tight group-hover:text-amber-500 transition-colors">{recipe.title}</h3>
                                            <p className="text-neutral-500 text-sm mt-4 leading-relaxed font-medium italic">"{recipe.instructions}"</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {activeTab === 'sales' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-amber-500 p-10 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden text-center">
                                    <h2 className="text-3xl font-black italic tracking-tighter uppercase leading-none mb-2">Sale Radar</h2>
                                    <p className="text-amber-100 text-[10px] font-black uppercase tracking-widest leading-none">Live Deals for your next Golden Prep</p>
                                </div>
                                
                                {loading ? (
                                    <div className="py-20 text-center font-black text-amber-300 animate-pulse uppercase tracking-widest italic">Checking for Deals...</div>
                                ) : (
                                    sales.map(sale => (
                                        <div key={sale.id} className="bg-white p-8 rounded-[2.8rem] border border-amber-50 shadow-md flex flex-col justify-between animate-fade relative overflow-hidden">
                                            <div className="flex justify-between items-start w-full">
                                                <div className="space-y-1">
                                                    <div className="flex items-center gap-3">
                                                        <p className="text-amber-600 text-[10px] font-black uppercase tracking-widest leading-none">{sale.status || 'Active Deal'}</p>
                                                        {sale.where && (
                                                            <p className="text-[11px] font-black text-amber-400 uppercase flex items-center gap-1 italic">
                                                                <IconMapPin /> {sale.where}
                                                            </p>
                                                        )}
                                                    </div>
                                                    <h3 className="text-2xl font-black uppercase tracking-tighter text-neutral-800 leading-none py-1">{sale.item}</h3>
                                                </div>
                                                <div className="bg-amber-50 text-amber-600 px-4 py-2 rounded-2xl font-black text-[10px] uppercase tracking-widest ring-1 ring-amber-100">Deal</div>
                                            </div>
                                            <p className="text-neutral-500 text-sm italic mt-4 font-medium leading-relaxed border-t border-amber-50 pt-4">
                                                "{sale.tip}"
                                            </p>
                                        </div>
                                    ))
                                )}

                                {sales.length === 0 && !loading && (
                                    <div className="py-20 text-center border-2 border-dashed border-neutral-200 rounded-[3rem] opacity-30 italic">
                                        <p className="text-neutral-400 font-bold text-sm uppercase tracking-widest">Searching for new deals in your sheet...</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-2xl border border-amber-100 p-3 flex gap-2 rounded-[2.8rem] shadow-2xl z-[100] ring-8 ring-amber-500/5">
                        <button onClick={() => setActiveTab('fridge')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'fridge' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300 hover:text-amber-500'}`}>
                            <IconCheck />{activeTab === 'fridge' && <span className="font-black text-[10px] tracking-widest uppercase">Rescue</span>}
                        </button>
                        <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'recipes' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300 hover:text-amber-500'}`}>
                            <IconBook />{activeTab === 'recipes' && <span className="font-black text-[10px] tracking-widest uppercase">Library</span>}
                        </button>
                        <button onClick={() => setActiveTab('sales')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'sales' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300 hover:text-amber-500'}`}>
                            <IconLunchbox />{activeTab === 'sales' && <span className="font-black text-[10px] tracking-widest uppercase font-black">Sales</span>}
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
