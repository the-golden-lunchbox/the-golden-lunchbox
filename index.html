<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for the app logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FCF9F1; 
            color: #451a03; 
            -webkit-tap-highlight-color: transparent; 
        }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        img { object-fit: cover; width: 100%; height: 250px; border-radius: 2rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconCheck = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
        );
        const IconBook = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );
        const IconTrash = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('fridge');
            const [inventory, setInventory] = useState([]);
            const [newItem, setNewItem] = useState('');
            const [recipes, setRecipes] = useState([]);
            const [loading, setLoading] = useState(false);

            const RECIPES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";

            // --- SMART CSV PARSER (Handles commas inside quotes) ---
            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    if (char === '"' && inQuotes && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                        currentRow = []; currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                const headers = (rows[0] || []).map(h => h.trim().toLowerCase());
                return rows.slice(1).map(row => headers.reduce((obj, header, i) => { 
                    obj[header] = row[i]; 
                    return obj; 
                }, {}));
            };

            const fetchRecipes = () => {
                setLoading(true);
                fetch(RECIPES_CSV)
                    .then(res => res.text())
                    .then(text => {
                        const data = parseCSV(text);
                        setRecipes(data.map(r => ({
                            title: r.title || r.name || "Untitled Recipe",
                            info: r.recipes || r.instructions || r.info || "Check guide.",
                            prep: r.efforts || r.time || "15m",
                            image: r.image || r.photo || ""
                        })));
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            };

            useEffect(() => {
                const saved = localStorage.getItem('gl-inventory');
                if (saved) setInventory(JSON.parse(saved));
                fetchRecipes();
            }, []);

            const addInv = () => {
                if(!newItem) return;
                const updated = [{ name: newItem, id: Date.now() }, ...inventory];
                setInventory(updated);
                localStorage.setItem('gl-inventory', JSON.stringify(updated));
                setNewItem('');
            };

            const removeInv = (id) => {
                const updated = inventory.filter(i => i.id !== id);
                setInventory(updated);
                localStorage.setItem('gl-inventory', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen pb-40">
                    <header className="p-8 border-b border-amber-100 bg-white sticky top-0 z-50 shadow-sm">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black text-amber-600 uppercase tracking-tighter leading-none">THE GOLDEN LUNCHBOX</h1>
                                <p className="text-[10px] font-black text-amber-400 uppercase tracking-widest mt-2 italic leading-none">
                                    {loading ? "Syncing..." : "✨ Library Live"}
                                </p>
                            </div>
                            <button onClick={fetchRecipes} className="bg-amber-500 text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-all">
                                <IconCheck />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-6 space-y-10">
                        {activeTab === 'fridge' && (
                            <div className="animate-fade space-y-8">
                                <div className="bg-white p-8 rounded-[3rem] shadow-xl border border-amber-50">
                                    <label className="block text-[10px] font-black text-amber-700 uppercase mb-4 tracking-widest px-1 italic">Log Discovery</label>
                                    <div className="flex flex-col gap-4">
                                        <input 
                                            className="w-full bg-neutral-50 rounded-2xl px-6 py-5 text-base font-bold outline-none border-2 border-transparent focus:border-amber-200 transition-all"
                                            placeholder="What's expiring? (e.g. 2 Yams)"
                                            value={newItem} onChange={e => setNewItem(e.target.value)}
                                            onKeyPress={e => e.key === 'Enter' && addInv()}
                                        />
                                        <button onClick={addInv} className="bg-amber-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all">Log Item</button>
                                    </div>
                                </div>
                                <div className="grid gap-3">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-6 rounded-[2.5rem] flex items-center justify-between border border-amber-50 shadow-sm">
                                            <div className="flex items-center gap-4">
                                                <div className="w-1.5 h-10 rounded-full bg-amber-400"></div>
                                                <p className="font-black text-neutral-800 text-lg leading-none">{item.name}</p>
                                            </div>
                                            <button onClick={() => removeInv(item.id)} className="p-2 text-neutral-200 hover:text-red-500 transition-colors"><IconTrash /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipes' && (
                            <div className="animate-fade space-y-8">
                                {loading ? (
                                    <div className="py-20 text-center font-black text-amber-200 animate-pulse uppercase tracking-widest italic">Syncing with Google...</div>
                                ) : (
                                    recipes.map((r, index) => (
                                        <div key={index} className="bg-white rounded-[3.5rem] border border-amber-50 shadow-sm overflow-hidden group hover:shadow-xl transition-all">
                                            {r.image && <img src={r.image} alt={r.title} onerror="this.style.display='none'"/>}
                                            <div className="p-10">
                                                <div className="flex justify-between items-center mb-4">
                                                    <div className="flex gap-2">
                                                        {r.tags && r.tags.map(tag => <span key={tag} className="text-[9px] bg-amber-50 text-amber-600 px-3 py-1 rounded-full font-black uppercase">{tag}</span>)}
                                                    </div>
                                                    <span className="text-[10px] font-black text-neutral-300 uppercase tracking-widest italic">Prep: {r.prep}</span>
                                                </div>
                                                <h3 className="font-black text-2xl text-neutral-800 leading-tight group-hover:text-amber-500 transition-colors">{r.title}</h3>
                                                
                                                {/* Full recipe display */}
                                                <div className="mt-6 pt-6 border-t border-amber-50">
                                                    <p className="text-neutral-500 text-lg leading-relaxed italic font-medium">
                                                        "{r.info}"
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-2xl border border-amber-100 p-3 flex gap-3 rounded-[3rem] shadow-2xl z-[100] ring-8 ring-amber-500/5">
                        <button onClick={() => setActiveTab('fridge')} className={`flex items-center gap-3 px-12 py-5 rounded-[2.2rem] transition-all duration-300 ${activeTab === 'fridge' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300'}`}>
                            <IconCheck /><span className="font-black text-[10px] tracking-widest uppercase">Rescue</span>
                        </button>
                        <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-3 px-12 py-5 rounded-[2.2rem] transition-all duration-300 ${activeTab === 'recipes' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300'}`}>
                            <IconBook /><span className="font-black text-[10px] tracking-widest uppercase font-black leading-none">Library</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
