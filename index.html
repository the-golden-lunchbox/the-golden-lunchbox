<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox | Premium Harvest</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FDFBFA; 
            color: #2D241E;
            -webkit-tap-highlight-color: transparent; 
        }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        .animate-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 🖼️ THE PREMIUM WATERMARK FRAME */
        .recipe-image-container {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            border-radius: 2rem 2rem 0 0;
            background: #EFE9E4;
        }

        .recipe-image {
            width: 100%;
            height: 110%; /* Slightly taller to allow bottom crop */
            object-fit: cover;
            object-position: center top; /* Keeps focus on food, crops bottom watermark */
            transition: transform 0.8s ease;
        }

        .recipe-card:hover .recipe-image { transform: scale(1.05); }

        /* Elegant Inner Border Frame */
        .recipe-image-container::after {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 1.5rem 1.5rem 0 0;
            pointer-events: none;
        }

        .instruction-text { white-space: pre-line; word-wrap: break-word; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .gold-gradient {
            background: linear-gradient(135deg, #D97706 0%, #B45309 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Sophisticated Icons ---
        const IconLeaf = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 1 8.8C19.3 14.7 15 18.9 11 20z"/><path d="M7 22c0-3 1-5 4-10"/></svg>;
        const IconBook = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconRadar = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19.07 4.93a10 10 0 0 0-14.14 0"/><path d="M15.53 8.47a5 5 0 0 0-7.06 0"/><circle cx="12" cy="12" r="1"/><path d="M12 7v5l3 3"/></svg>;
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [inventory, setInventory] = useState([]);
            const [newItem, setNewItem] = useState('');
            const [recipes, setRecipes] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(false);

            // --- Google Sheets URL ---
            const RECIPES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";
            const SALES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_-MLitKb9cTRAD5rtiw9Vi9MscUEPIIQG7wKIPpzUI8AwYI84tuz3NVtez-6z6xjFG6ZySgRYClQg/pub?output=csv";

            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    if (char === '"' && inQuotes && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                        currentRow = []; currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                const headers = (rows[0] || []).map(h => h.trim().toLowerCase());
                return rows.slice(1).map(row => headers.reduce((obj, header, i) => { obj[header] = row[i]; return obj; }, {}));
            };

            const findVal = (row, nicknames) => {
                const keys = Object.keys(row);
                const found = keys.find(k => nicknames.some(n => k.includes(n)));
                return found ? row[found] : "";
            };

            const syncData = async () => {
                setLoading(true);
                try {
                    const [resR, resS] = await Promise.all([fetch(RECIPES_URL), fetch(SALES_URL)]);
                    const [textR, textS] = await Promise.all([resR.text(), resS.text()]);
                    
                    setRecipes(parseCSV(textR).map(r => ({
                        title: findVal(r, ['title', 'name', 'recipe']),
                        info: findVal(r, ['recipes', 'instructions', 'info', 'method']),
                        image: findVal(r, ['image', 'photo', 'img']),
                        tags: (findVal(r, ['tags', 'category', 'type']) || "Seasonal").split('|')
                    })));

                    setSales(parseCSV(textS).filter(s => {
                        const val = String(findVal(s, ['active', 'live', 'show'])).toUpperCase();
                        return val === 'TRUE' || val === 'YES' || val === '1' || val === '';
                    }).map(s => ({
                        item: findVal(s, ['item', 'name', 'product', 'deal']),
                        location: findVal(s, ['location', 'where', 'store', 'at']),
                        tip: findVal(s, ['tip', 'note', 'desc']),
                        image: findVal(s, ['image', 'photo', 'img'])
                    })));
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            useEffect(() => {
                const saved = localStorage.getItem('gl-inventory-v2');
                if (saved) setInventory(JSON.parse(saved));
                syncData();
            }, []);

            const addInv = () => {
                if (!newItem.trim()) return;
                const updated = [{ name: newItem, id: Date.now() }, ...inventory];
                setInventory(updated);
                localStorage.setItem('gl-inventory-v2', JSON.stringify(updated));
                setNewItem('');
            };

            const removeInv = (id) => {
                const updated = inventory.filter(i => i.id !== id);
                setInventory(updated);
                localStorage.setItem('gl-inventory-v2', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen pb-40">
                    <header className="p-8 pb-4">
                        <div className="max-w-2xl mx-auto flex justify-between items-end">
                            <div>
                                <h1 className="text-4xl font-black text-amber-600 tracking-tighter uppercase leading-tight italic">
                                    The Golden<br/>Lunchbox
                                </h1>
                                <p className="text-[10px] font-bold text-stone-400 uppercase tracking-[0.3em] mt-2 flex items-center gap-2">
                                    <span className="w-8 h-[1px] bg-stone-200"></span>
                                    {loading ? "Refreshing Library..." : "Kitchen Live"}
                                </p>
                            </div>
                            <div className="bg-stone-100 p-3 rounded-full text-stone-400">
                                <IconLeaf />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 space-y-12 mt-6">
                        
                        {/* --- RECOVERY TAB --- */}
                        {activeTab === 'rescue' && (
                            <div className="animate-up space-y-8">
                                <div className="bg-white p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(45,36,30,0.05)] border border-stone-100">
                                    <h2 className="text-2xl font-bold mb-1 italic">Log Discovery</h2>
                                    <p className="text-stone-400 text-xs mb-8">Keep track of what's expiring soon.</p>
                                    <div className="flex flex-col gap-4">
                                        <input 
                                            className="w-full bg-stone-50 rounded-2xl px-6 py-5 text-lg font-semibold border-2 border-transparent focus:border-amber-200 outline-none transition-all placeholder:text-stone-300"
                                            placeholder="What did you find?"
                                            value={newItem} onChange={e => setNewItem(e.target.value)}
                                            onKeyPress={e => e.key === 'Enter' && addInv()}
                                        />
                                        <button onClick={addInv} className="gold-gradient text-white font-bold py-5 rounded-2xl shadow-xl shadow-amber-200 uppercase text-xs tracking-widest flex items-center justify-center gap-2">
                                            <IconPlus /> Log Discovery
                                        </button>
                                    </div>
                                </div>
                                <div className="grid gap-4">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-6 rounded-[2rem] flex items-center justify-between border border-stone-50 shadow-sm animate-up">
                                            <div className="flex items-center gap-5">
                                                <div className="w-2 h-10 rounded-full bg-amber-100"></div>
                                                <p className="font-bold text-stone-800 text-xl tracking-tight">{item.name}</p>
                                            </div>
                                            <button onClick={() => removeInv(item.id)} className="p-3 text-stone-200 hover:text-red-400 transition-colors">
                                                <IconTrash />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- LIBRARY TAB --- */}
                        {activeTab === 'library' && (
                            <div className="animate-up space-y-12">
                                {recipes.map((r, i) => (
                                    <div key={i} className="recipe-card bg-white rounded-[4rem] shadow-[0_30px_60px_rgba(45,36,30,0.08)] overflow-hidden border border-stone-100">
                                        <div className="recipe-image-container">
                                            {r.image && <img src={r.image} alt={r.title} className="recipe-image" onerror="this.style.display='none'"/>}
                                        </div>
                                        <div className="p-12">
                                            <div className="flex gap-2 mb-6">
                                                {r.tags.map(t => <span key={t} className="text-[10px] bg-stone-50 text-stone-400 px-4 py-1.5 rounded-full font-black uppercase tracking-widest border border-stone-100">{t}</span>)}
                                            </div>
                                            <h3 className="text-4xl font-black text-stone-800 leading-[1.1] mb-8">{r.title}</h3>
                                            <div className="bg-amber-50/50 p-10 rounded-[3rem] border border-amber-100/50">
                                                <p className="instruction-text text-stone-600 text-lg leading-relaxed italic font-medium">
                                                    "{r.info}"
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- RADAR TAB --- */}
                        {activeTab === 'radar' && (
                            <div className="animate-up space-y-10">
                                <div className="wood-texture p-12 rounded-[4rem] bg-stone-900 text-white relative overflow-hidden text-center shadow-2xl">
                                    <div className="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none" style={{backgroundImage: 'url("https://www.transparenttextures.com/patterns/dark-wood.png")'}}></div>
                                    <h2 className="text-4xl font-black italic tracking-tighter uppercase leading-none drop-shadow-md">Sale Radar</h2>
                                    <p className="text-amber-400 text-[10px] font-black uppercase tracking-widest mt-3">Community Harvest Watch</p>
                                </div>
                                {sales.map((s, i) => (
                                    <div key={i} className="bg-white rounded-[3.5rem] border border-stone-50 shadow-xl overflow-hidden flex flex-col group animate-up">
                                        <div className="recipe-image-container" style={{height: '240px'}}>
                                            {s.image && <img src={s.image} alt={s.item} className="recipe-image" onerror="this.style.display='none'"/>}
                                        </div>
                                        <div className="p-12">
                                            <div className="flex items-center justify-between mb-4">
                                                <span className="text-[10px] font-black text-amber-600 uppercase tracking-widest bg-amber-50 px-4 py-1.5 rounded-full">In Stock</span>
                                                <span className="text-[11px] font-black text-stone-400 uppercase italic flex items-center">
                                                    📍 {s.location || "Local Market"}
                                                </span>
                                            </div>
                                            <h3 className="text-3xl font-black uppercase tracking-tighter text-stone-800 leading-none">{s.item}</h3>
                                            <p className="instruction-text text-stone-500 text-lg mt-8 pt-8 border-t border-stone-100 font-medium leading-relaxed italic italic">
                                                "{s.tip}"
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* --- Sophisticated Nav Dock --- */}
                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 nav-glass p-3 flex gap-4 rounded-[3.5rem] shadow-[0_25px_50px_rgba(0,0,0,0.15)] z-[100] border-2 border-white">
                        <button onClick={() => setActiveTab('rescue')} className={`flex items-center justify-center w-16 h-16 rounded-full transition-all duration-500 ${activeTab === 'rescue' ? 'bg-amber-600 text-white shadow-lg scale-110 shadow-amber-200' : 'text-stone-300 hover:text-stone-500'}`}>
                            <IconLeaf />
                        </button>
                        <button onClick={() => setActiveTab('library')} className={`flex items-center justify-center w-16 h-16 rounded-full transition-all duration-500 ${activeTab === 'library' ? 'bg-amber-600 text-white shadow-lg scale-110 shadow-amber-200' : 'text-stone-300 hover:text-stone-500'}`}>
                            <IconBook />
                        </button>
                        <button onClick={() => setActiveTab('radar')} className={`flex items-center justify-center w-16 h-16 rounded-full transition-all duration-500 ${activeTab === 'radar' ? 'bg-amber-600 text-white shadow-lg scale-110 shadow-amber-200' : 'text-stone-300 hover:text-stone-500'}`}>
                            <IconRadar />
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
