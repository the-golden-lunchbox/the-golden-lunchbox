<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox | Family Legacy</title>
    <!-- Adds a Yam emoji to the browser tab -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍠</text></svg>">
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Dependencies (Tailwind & React) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #FDFBFA; color: #2D241E; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        h1, h2, h3, h4, h5, .serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .recipe-image-container { position: relative; width: 100%; height: 320px; overflow: hidden; border-radius: 3rem 3rem 0 0; background: #EFE9E4; }
        @media (min-width: 768px) { .recipe-image-container { height: 450px; } }
        .recipe-image { width: 100%; height: 125%; object-fit: cover; object-position: center top; transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .recipe-card:hover .recipe-image { transform: scale(1.08); }

        .receipt-card { background: white; border: 1px solid #f1f1f1; position: relative; border-radius: 2.5rem 2.5rem 0 0; text-align: center; }
        .receipt-card::after { content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px; background-image: linear-gradient(-45deg, transparent 5px, white 5px), linear-gradient(45deg, transparent 5px, white 5px); background-size: 10px 10px; }

        .instruction-text { white-space: pre-line; word-wrap: break-word; overflow-wrap: break-word; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .nav-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .animate-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Stable SVG Icons ---
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconHeart = ({ fill = "none" }) => <svg width="18" height="18" viewBox="0 0 24 24" fill={fill} stroke={fill === 'none' ? 'currentColor' : 'none'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
        const IconChef = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M6 13.81c.62 1.51 2.12 2.19 3 2.19h6c.88 0 2.38-.68 3-2.19V11h-12v2.81z"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconBook = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconRadar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M12 12l4 4"/></svg>;
        const IconShop = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const IconSparkles = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-amber-500"><path d="M12 3l1.912 5.813L21 10.725l-5.813 1.912L12 21l-1.912-5.813L3 13.275l5.813-1.912L12 3z"/></svg>;
        const IconBasket = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-2 text-amber-600/40"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const IconStove = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-2 text-amber-600/40"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconShare = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;
        const IconClose = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconPlus = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [searchQuery, setSearchQuery] = useState('');
            const [userRecipes, setUserRecipes] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(false);
            
            // Modals & States
            const [showAddRecipe, setShowAddRecipe] = useState(false);
            const [newRecipe, setNewRecipe] = useState({ title: '', instructions: '', secret: '', forKids: false });
            const [isVipModalOpen, setIsVipModalOpen] = useState(false);
            const [isSubmitDealModalOpen, setIsSubmitDealModalOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState('');

            // --- YOUR Google Sheet Links ---
            const RECIPES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHHHTGLJ1lI-0t6oul22nPw6LVClKisFMZ4Tx9yizyU65yEZhuju-loFhMcHQMUhk6S8OgRTjzKXXE/pub?gid=0&single=true&output=csv";
            const SALES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHHHTGLJ1lI-0t6oul22nPw6LVClKisFMZ4Tx9yizyU65yEZhuju-loFhMcHQMUhk6S8OgRTjzKXXE/pub?gid=2065159065&single=true&output=csv";

            const fixImageUrl = (url) => {
                if (!url) return "";
                let u = url.trim();
                if (u.includes('drive.google.com')) {
                    let id = "";
                    if (u.includes('/file/d/')) { id = u.split('/file/d/')[1].split('/')[0]; } 
                    else if (u.includes('id=')) { id = u.split('id=')[1].split('&')[0]; }
                    if (id) return `https://lh3.googleusercontent.com/u/0/d/${id}=w1200`;
                }
                return u;
            };

            const parseRobustCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (inQuotes) {
                        if (char === '"' && text[i+1] === '"') { currentField += '"'; i++; } 
                        else if (char === '"') { inQuotes = false; } 
                        else { currentField += char; }
                    } else {
                        if (char === '"') { inQuotes = true; } 
                        else if (char === ',') { currentRow.push(currentField.trim()); currentField = ''; } 
                        else if (char === '\n' || char === '\r') {
                            currentRow.push(currentField.trim());
                            if (currentRow.some(field => field !== '')) rows.push(currentRow);
                            currentRow = []; currentField = '';
                            if (char === '\r' && text[i+1] === '\n') i++; 
                        } else { currentField += char; }
                    }
                }
                if (currentField !== '' || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                return rows;
            };

            const syncData = async () => {
                setLoading(true);
                try {
                    const [resR, resS] = await Promise.all([fetch(RECIPES_URL), fetch(SALES_URL)]);
                    const textR = await resR.text();
                    const textS = await resS.text();

                    const rData = parseRobustCSV(textR);
                    const rHeaders = (rData[0] || []).map(h => h ? h.toLowerCase().trim() : '');
                    const findIdx = (headers, nicks) => headers.findIndex(h => nicks.some(n => h.includes(n)));

                    setRecipes(rData.slice(1).map((r, i) => {
                        const titleIdx = findIdx(rHeaders, ['title', 'name']);
                        const infoIdx = findIdx(rHeaders, ['recipes', 'instructions', 'info', 'method']);
                        const imageIdx = findIdx(rHeaders, ['image', 'photo', 'img', 'url', 'picture']);
                        const secretIdx = findIdx(rHeaders, ['secret', 'tip', 'hack']);
                        const tagIdx = findIdx(rHeaders, ['tags', 'category']);

                        return {
                            id: i,
                            title: titleIdx !== -1 && r[titleIdx] ? r[titleIdx] : "Golden Harvest",
                            info: infoIdx !== -1 && r[infoIdx] ? r[infoIdx] : "Instructions coming soon.",
                            image: imageIdx !== -1 && r[imageIdx] ? fixImageUrl(r[imageIdx]) : "",
                            secret: secretIdx !== -1 && r[secretIdx] ? r[secretIdx] : "",
                            tags: tagIdx !== -1 && r[tagIdx] ? r[tagIdx].split('|').map(t => t.trim()) : ["Rescue", "Budget"]
                        };
                    }).filter(r => r.title !== "Golden Harvest" || r.info !== "Instructions coming soon.")); 

                    const sData = parseRobustCSV(textS);
                    const sHeaders = (sData[0] || []).map(h => h ? h.toLowerCase().trim() : '');
                    
                    setSales(sData.slice(1).map((s, i) => {
                        const itemIdx = findIdx(sHeaders, ['item', 'name', 'product']);
                        const locIdx = findIdx(sHeaders, ['location', 'where', 'store']);
                        const tipIdx = findIdx(sHeaders, ['tip', 'note', 'desc']);
                        const imgIdx = findIdx(sHeaders, ['image', 'photo', 'img', 'url']);

                        return {
                            id: i,
                            item: itemIdx !== -1 && s[itemIdx] ? s[itemIdx] : "Market Find",
                            location: locIdx !== -1 && s[locIdx] ? s[locIdx] : "Local",
                            tip: tipIdx !== -1 && s[tipIdx] ? s[tipIdx] : "",
                            image: imgIdx !== -1 && s[imgIdx] ? fixImageUrl(s[imgIdx]) : ""
                        };
                    }).filter(s => s.item !== "Market Find"));

                } catch (e) { console.error("Sync issue:", e); } finally { setLoading(false); }
            };

            useEffect(() => {
                const saved = localStorage.getItem('gl-legacy-pro');
                if (saved) setUserRecipes(JSON.parse(saved));
                syncData();
            }, []);

            const filteredRecipes = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return recipes.filter(r => r.title.toLowerCase().includes(q) || r.info.toLowerCase().includes(q));
            }, [recipes, searchQuery]);

            const filteredSales = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return sales.filter(s => s.item.toLowerCase().includes(q) || s.location.toLowerCase().includes(q) || s.tip.toLowerCase().includes(q));
            }, [sales, searchQuery]);

            const saveLegacy = () => {
                if (!newRecipe.title.trim()) return;
                const updated = [{ ...newRecipe, id: Date.now(), date: new Date().toLocaleDateString() }, ...userRecipes];
                setUserRecipes(updated);
                localStorage.setItem('gl-legacy-pro', JSON.stringify(updated));
                setNewRecipe({ title: '', instructions: '', secret: '', forKids: false });
                setShowAddRecipe(false);
            };

            const handleShare = async (title, text) => {
                try {
                    if (navigator.share) { await navigator.share({ title: title, text: text, url: window.location.href }); } 
                    else { await navigator.clipboard.writeText(`${title} - ${text}`); setToastMsg('Copied to clipboard!'); setTimeout(() => setToastMsg(''), 3000); }
                } catch (error) { console.log('Sharing canceled or failed', error); }
            };

            return (
                <div className="min-h-screen bg-[#FDFBFA] text-[#2D241E] pb-40 overflow-x-hidden font-sans relative">
                    {toastMsg && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-stone-900 text-white px-8 py-4 rounded-full text-[10px] font-bold tracking-[0.2em] uppercase z-[300] shadow-2xl">
                            {toastMsg}
                        </div>
                    )}

                    <header className="sticky top-0 z-[60] bg-[#FDFBFA]/95 backdrop-blur-xl border-b border-stone-100 p-6 md:p-10 text-center">
                        <div className="max-w-2xl mx-auto space-y-6">
                            <div className="space-y-2">
                                <h1 className="text-4xl md:text-5xl font-bold text-amber-600 tracking-tighter uppercase leading-none italic">Golden<br/>Lunchbox</h1>
                                <div className="flex justify-center">
                                    <span className="text-[10px] font-bold bg-amber-50 text-amber-600 px-4 py-1 rounded-full uppercase tracking-[0.3em] border border-amber-100 cursor-pointer" onClick={syncData}>
                                        {loading ? "Gathering..." : "Legacy Active (Sync)"}
                                    </span>
                                </div>
                            </div>
                            
                            {(activeTab === 'library' || activeTab === 'radar') && (
                                <div className="relative max-w-sm mx-auto group">
                                    <div className="absolute left-6 top-1/2 -translate-y-1/2 text-stone-300"><IconSearch /></div>
                                    <input type="text" placeholder={activeTab === 'radar' ? "Search locations or deals..." : "Find a recipe..."} className="w-full bg-stone-100/50 border border-stone-100 rounded-full py-4 pl-14 pr-8 font-medium text-sm outline-none focus:ring-4 focus:ring-amber-500/5 focus:bg-white transition-all text-center" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 pt-10 space-y-16 relative">
                        {/* --- KITCHEN TAB --- */}
                        {activeTab === 'kitchen' && (
                            <div className="animate-up space-y-12 text-center">
                                <div className="bg-stone-900 text-white p-12 md:p-16 rounded-[3.5rem] shadow-2xl relative overflow-hidden">
                                    <h2 className="text-4xl md:text-5xl font-bold italic mb-2 text-white">My Legacy</h2>
                                    <p className="text-stone-400 text-[10px] mb-10 italic tracking-[0.3em] uppercase">Building for the family.</p>
                                    <button onClick={() => setShowAddRecipe(!showAddRecipe)} className="bg-amber-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-[10px] shadow-2xl active:scale-95 transition-all">
                                        {showAddRecipe ? "Close" : "New Recipe Entry"}
                                    </button>
                                </div>
                                {showAddRecipe && (
                                    <div className="bg-white p-8 md:p-12 rounded-[4rem] shadow-xl border border-stone-100 space-y-8 animate-up">
                                        <input className="w-full bg-stone-50 p-6 rounded-2xl outline-none font-bold text-center text-xl" placeholder="Recipe Title" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} />
                                        <textarea className="w-full bg-stone-50 p-8 rounded-3xl outline-none h-48 text-center text-stone-600 text-base leading-relaxed italic" placeholder="Describe the budget rescue process..." value={newRecipe.instructions} onChange={e => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                                        <div className="flex justify-center py-2">
                                            <label className="flex items-center gap-4 cursor-pointer group">
                                                <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${newRecipe.forKids ? 'bg-red-500 border-red-500 scale-110 shadow-lg shadow-red-100' : 'border-stone-200'}`}>
                                                    {newRecipe.forKids && <IconHeart fill="white" />}
                                                </div>
                                                <input type="checkbox" className="hidden" checked={newRecipe.forKids} onChange={(e) => setNewRecipe({...newRecipe, forKids: e.target.checked})} />
                                                <span className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Mark as Kid's Favorite</span>
                                            </label>
                                        </div>
                                        <button onClick={saveLegacy} className="w-full bg-stone-900 text-white py-6 rounded-full font-bold uppercase text-[11px] tracking-[0.4em] shadow-xl">Save to Legacy</button>
                                    </div>
                                )}
                                <div className="grid gap-12">
                                    {userRecipes.map(r => (
                                        <div key={r.id} className="receipt-card p-10 md:p-14 shadow-sm animate-up bg-white border border-stone-50">
                                            <div className="space-y-8">
                                                <div className="space-y-3">
                                                    <div className="flex justify-center gap-3 items-center">
                                                        <span className="text-[10px] font-bold uppercase tracking-widest text-amber-500/40">{r.date}</span>
                                                        {r.forKids && <span className="text-[10px] font-bold text-red-500 uppercase tracking-widest flex items-center gap-2 bg-red-50 px-3 py-0.5 rounded-full"><IconHeart fill="currentColor" /> Kids Choice</span>}
                                                    </div>
                                                    <h4 className="text-4xl font-bold italic text-stone-800 leading-tight">{r.title}</h4>
                                                </div>
                                                <div className="space-y-6">
                                                    <h5 className="text-[11px] font-bold text-stone-300 uppercase tracking-[0.3em] flex items-center justify-center border-b border-stone-50 pb-3 max-w-[160px] mx-auto"><IconStove /> The Method</h5>
                                                    <p className="instruction-text text-stone-600 italic text-lg leading-relaxed px-2 md:px-6">"{r.instructions}"</p>
                                                </div>
                                                <div className="pt-4 flex justify-between items-center px-4 border-t border-stone-50/50 mt-6">
                                                    <button onClick={() => handleShare(r.title, r.instructions)} className="text-stone-400 hover:text-amber-600 transition-colors flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest px-4 py-2 bg-stone-50 rounded-full"><IconShare /> Share</button>
                                                    <button onClick={() => {const u = userRecipes.filter(x => x.id !== r.id); setUserRecipes(u); localStorage.setItem('gl-legacy-pro', JSON.stringify(u));}} className="text-stone-300 hover:text-red-400 transition-colors p-2"><IconTrash /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- LIBRARY TAB --- */}
                        {activeTab === 'library' && (
                            <div className="animate-up space-y-16 text-center">
                                {filteredRecipes.length > 0 ? filteredRecipes.map((r, i) => (
                                    <div key={i} className="recipe-card bg-white rounded-[4rem] shadow-sm overflow-hidden border border-stone-100 group transition-all duration-700 hover:shadow-2xl">
                                        <div className="recipe-image-container">
                                            {r.image ? (
                                                <img src={r.image} alt={r.title} className="recipe-image" onError={(e) => { e.target.style.display = 'none'; e.target.parentNode.style.background = 'linear-gradient(135deg, #FDFBFA 0%, #EFE9E4 100%)'; }} />
                                            ) : (
                                                <div className="w-full h-full bg-amber-50 flex items-center justify-center italic text-amber-200 text-xl"><IconChef /></div>
                                            )}
                                            <div className="absolute top-10 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl px-6 py-2 rounded-full shadow-xl border border-white/50 flex items-center gap-3">
                                                <IconSparkles />
                                                <p className="text-[10px] font-bold text-amber-600 uppercase tracking-[0.3em] italic">Rescue Goal</p>
                                            </div>
                                        </div>
                                        <div className="p-10 md:p-16 space-y-12 relative">
                                            <button onClick={() => handleShare(r.title, r.info)} className="absolute top-6 right-6 bg-stone-50 text-stone-500 hover:text-amber-600 hover:bg-amber-50 p-4 rounded-full transition-all shadow-sm"><IconShare /></button>
                                            <div className="space-y-4">
                                                <div className="flex justify-center gap-3 flex-wrap">
                                                    {r.tags.map(t => <span key={t} className="text-[10px] bg-stone-50 text-stone-400 px-4 py-1.5 rounded-full font-bold uppercase tracking-widest border border-stone-100 italic">#{t}</span>)}
                                                </div>
                                                <h3 className="text-5xl md:text-6xl font-bold text-stone-800 leading-[1.1] tracking-tight">{r.title}</h3>
                                            </div>
                                            <div className="space-y-10">
                                                <div className="space-y-6">
                                                    <h5 className="text-[11px] font-bold text-stone-300 uppercase tracking-[0.4em] flex items-center justify-center"><IconStove /> Instructions</h5>
                                                    <div className="bg-stone-50/50 p-10 md:p-14 rounded-[3.5rem] border border-stone-100 shadow-inner relative max-w-xl mx-auto">
                                                        <p className="instruction-text text-stone-700 italic text-xl md:text-2xl leading-relaxed font-medium">"{r.info}"</p>
                                                    </div>
                                                </div>
                                            </div>
                                            {r.secret && (
                                                <div className="bg-amber-600 p-12 rounded-[3.5rem] text-white shadow-2xl max-w-md mx-auto relative overflow-hidden group-hover:scale-105 transition-transform duration-500">
                                                    <div className="absolute -right-6 -top-6 opacity-10 rotate-12 scale-150"><IconSparkles /></div>
                                                    <h6 className="text-[10px] font-bold text-amber-200 uppercase tracking-[0.4em] mb-4 italic flex justify-center items-center gap-2"><IconChef /> The Curator's Secret</h6>
                                                    <p className="text-2xl md:text-3xl font-bold italic leading-tight">"{r.secret}"</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )) : <div className="text-center py-40 opacity-20 italic font-bold text-stone-300 text-3xl uppercase tracking-widest">Harvest Empty...</div>}
                            </div>
                        )}

                        {/* --- RADAR TAB --- */}
                        {activeTab === 'radar' && (
                            <div className="animate-up space-y-16 text-center">
                                <div className="p-16 rounded-[4rem] bg-stone-900 text-white text-center shadow-2xl relative overflow-hidden flex flex-col items-center">
                                    <h2 className="text-4xl md:text-5xl font-bold italic mb-4">Budget Radar</h2>
                                    <p className="text-amber-400 text-[10px] font-bold uppercase tracking-[0.5em] italic mb-8">Neighborhood Watch</p>
                                    <button onClick={() => setIsSubmitDealModalOpen(true)} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all flex items-center shadow-lg"><IconPlus /> Submit a Deal</button>
                                </div>
                                <div className="grid gap-12">
                                    {filteredSales.map((s, i) => (
                                        <div key={i} className="bg-white rounded-[4.5rem] shadow-sm overflow-hidden border border-stone-100 animate-up transition-all hover:shadow-xl relative">
                                            <button onClick={() => handleShare(s.item, s.tip ? `${s.location}: ${s.tip}` : s.location)} className="absolute top-6 right-6 z-10 bg-white/90 backdrop-blur text-stone-600 hover:text-amber-600 p-4 rounded-full transition-all shadow-sm border border-white/50"><IconShare /></button>
                                            {s.image && (
                                                <div className="recipe-image-container h-64 md:h-80"><img src={s.image} alt={s.item} className="recipe-image" /></div>
                                            )}
                                            <div className="p-12 md:p-16 space-y-8">
                                                <div className="flex justify-center items-center gap-4">
                                                    <span className="text-[10px] font-bold bg-amber-50 text-amber-600 px-6 py-2 rounded-full border border-amber-100 uppercase tracking-[0.2em] italic">Live Deal</span>
                                                    <span className="text-[11px] font-bold text-stone-400 uppercase italic">📍 {s.location}</span>
                                                </div>
                                                <h3 className="text-4xl md:text-5xl font-bold text-stone-800 leading-none">{s.item}</h3>
                                                {s.tip && (
                                                    <div className="space-y-6 border-t border-stone-50 pt-10 mt-6">
                                                        <h5 className="text-[11px] font-bold text-stone-200 uppercase tracking-[0.4em] flex items-center justify-center"><IconBasket /> Shopping Tip</h5>
                                                        <p className="instruction-text text-stone-500 italic text-xl md:text-2xl">"{s.tip}"</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {filteredSales.length === 0 && <div className="text-center py-20 opacity-30 italic font-bold text-stone-400 text-2xl uppercase tracking-widest">No deals found...</div>}
                                </div>
                            </div>
                        )}

                        {/* --- BOUTIQUE TAB --- */}
                        {activeTab === 'boutique' && (
                            <div className="animate-up space-y-16 text-center px-4">
                                <div className="space-y-8">
                                    <h2 className="text-6xl md:text-7xl font-bold italic">Boutique</h2>
                                    <p className="text-stone-400 text-[11px] uppercase tracking-[0.8em] font-bold italic px-8">Purpose Over Price</p>
                                </div>

                                <div className="bg-amber-100 p-12 md:p-16 rounded-[4rem] border border-amber-200 shadow-sm relative overflow-hidden group">
                                    <div className="absolute -right-10 -top-10 opacity-20 rotate-12 scale-150 text-amber-600 transition-transform duration-700 group-hover:rotate-45"><IconBook /></div>
                                    <h3 className="text-4xl md:text-5xl font-bold text-amber-900 italic mb-4 relative z-10">Get the 5-Day Zero-Waste Menu</h3>
                                    <p className="text-amber-800 text-lg mb-10 font-medium relative z-10 max-w-md mx-auto">Download my free step-by-step guide to prepping a week of healthy school lunches in just 60 minutes.</p>
                                    <button onClick={() => window.open('https://docs.google.com/forms', '_blank')} className="w-full max-w-sm mx-auto block bg-amber-600 text-white py-6 rounded-full font-bold uppercase text-[11px] tracking-[0.4em] shadow-xl hover:bg-amber-700 transition-colors relative z-10 hover:scale-105 active:scale-95 duration-200">
                                        Download Free Menu
                                    </button>
                                </div>

                                <div className="grid gap-12">
                                    <div className="bg-white p-16 rounded-[5rem] border border-stone-100 shadow-sm hover:border-stone-200 transition-all">
                                        <div className="flex flex-col items-center mb-8">
                                            <h3 className="text-4xl font-bold text-stone-800 italic mb-4">Harvest VIP</h3>
                                            <span className="text-[10px] bg-stone-800 text-white px-6 py-2 rounded-full font-bold uppercase tracking-[0.3em]">Full Access Hub</span>
                                        </div>
                                        <p className="text-stone-500 text-lg mb-12 font-medium leading-relaxed italic px-6">"Unlock private recipe guides and full boutique library for less than a coffee."</p>
                                        <button onClick={() => setIsVipModalOpen(true)} className="w-full max-w-sm mx-auto block bg-stone-900 text-white py-6 rounded-full font-bold uppercase text-[11px] tracking-[0.5em] shadow-2xl hover:bg-black transition-colors">Join for $9/mo</button>
                                    </div>
                                </div>

                                <div className="max-w-lg mx-auto p-12 bg-amber-50 rounded-[4rem] border border-amber-100 shadow-sm mt-16">
                                    <p className="text-xl text-amber-900 italic leading-relaxed font-semibold">
                                        "I built this for my kids and for every family on a strict budget. We start with a forgotten squash and build a golden legacy."
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- MODALS --- */}
                    {isVipModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="bg-white rounded-[3.5rem] p-12 w-full max-w-md relative shadow-2xl text-center border-4 border-amber-50">
                                <button onClick={() => setIsVipModalOpen(false)} className="absolute top-6 right-6 text-stone-300 hover:text-stone-800 transition-colors p-2 bg-stone-50 rounded-full"><IconClose /></button>
                                <div className="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-6 text-amber-500"><IconSparkles /></div>
                                <h3 className="text-4xl font-bold italic text-amber-600 mb-4 leading-none">VIP Access Hub</h3>
                                <p className="text-stone-500 mb-10 font-medium leading-relaxed">Once your Stripe account is ready, we will link it right here!</p>
                                <button onClick={() => setIsVipModalOpen(false)} className="w-full bg-stone-900 text-white py-5 rounded-full font-bold uppercase tracking-[0.3em] text-[10px] hover:bg-amber-600 transition-colors">Close For Now</button>
                            </div>
                        </div>
                    )}

                    {isSubmitDealModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="bg-white rounded-[3.5rem] p-12 w-full max-w-md relative shadow-2xl text-center border-4 border-amber-50">
                                <button onClick={() => setIsSubmitDealModalOpen(false)} className="absolute top-6 right-6 text-stone-300 hover:text-stone-800 transition-colors p-2 bg-stone-50 rounded-full"><IconClose /></button>
                                <div className="w-20 h-20 bg-stone-900 rounded-full flex items-center justify-center mx-auto mb-6 text-white"><IconRadar /></div>
                                <h3 className="text-4xl font-bold italic text-stone-800 mb-4 leading-none">Share a Find</h3>
                                <p className="text-stone-500 mb-10 font-medium leading-relaxed">Did you spot an incredible grocery deal? Submit it to our community board!</p>
                                <a href="https://forms.google.com" target="_blank" rel="noreferrer" className="block w-full bg-amber-500 text-white py-5 rounded-full font-bold uppercase tracking-[0.3em] text-[10px] shadow-xl hover:bg-amber-600 transition-colors">Open Submission Form</a>
                            </div>
                        </div>
                    )}

                    {/* --- Navigation Dock --- */}
                    <nav className="fixed bottom-12 left-1/2 -translate-x-1/2 nav-glass p-4 flex gap-6 md:gap-10 rounded-full shadow-[0_30px_60px_rgba(0,0,0,0.15)] z-[100] border-2 border-white scale-90 md:scale-100">
                        <button onClick={() => {setActiveTab('kitchen'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'kitchen' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconChef /></button>
                        <button onClick={() => {setActiveTab('library'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'library' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconBook /></button>
                        <button onClick={() => {setActiveTab('radar'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'radar' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconRadar /></button>
                        <button onClick={() => {setActiveTab('boutique'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'boutique' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconShop /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
