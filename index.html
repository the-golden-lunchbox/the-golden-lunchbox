<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FCF9F1; color: #451a03; -webkit-tap-highlight-color: transparent; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconLunchbox = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="12" rx="4" /><path d="M7 8V6a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v2" /><line x1="3" y1="14" x2="21" y2="14" /></svg>
        );
        const IconCheck = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
        );
        const IconBook = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );
        const IconTrash = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('fridge');
            const [inventory, setInventory] = useState([]);
            const [newItem, setNewItem] = useState({ name: '', days: 3 });
            const [recipes, setRecipes] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            // YOUR LIVE GOOGLE SHEET CSV LINK
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";

            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    if (char === '"' && inQuotes && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                        currentRow = []; currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField.trim()); rows.push(currentRow); }
                const headers = rows[0] || [];
                return rows.slice(1).map(row => headers.reduce((obj, header, i) => { 
                    obj[header.trim()] = row[i]; 
                    return obj; 
                }, {}));
            };

            const fetchData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(SHEET_URL);
                    if (!response.ok) throw new Error("Could not connect to Google Sheets.");
                    const text = await response.text();
                    const data = parseCSV(text);
                    
                    // SMART MAPPING: Finds columns even if the name is slightly different
                    const formatted = data.map(r => {
                        const find = (names) => {
                            const key = Object.keys(r).find(k => names.includes(k.toLowerCase().trim()));
                            return key ? r[key] : null;
                        };

                        return {
                            id: find(['id', 'no']) || Math.random(),
                            title: find(['title', 'name', 'recipe name']) || "Untitled Recipe",
                            tags: (find(['tags', 'category', 'type']) || "Golden").split('|').map(t => t.trim()),
                            instructions: find(['recipes', 'recipe', 'instructions', 'method', 'content']) || "No instructions found.",
                            time: find(['efforts', 'effort', 'time', 'prep']) || "15m",
                            isPremium: String(find(['ispremium', 'premium', 'locked'])).toLowerCase() === 'true'
                        };
                    });
                    
                    if (formatted.length === 0) throw new Error("Spreadsheet is empty.");
                    setRecipes(formatted);
                } catch (e) { 
                    console.error(e);
                    setError(e.message);
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                const saved = localStorage.getItem('golden-lunchbox-data');
                if (saved) setInventory(JSON.parse(saved));
                fetchData();
            }, []);

            const addItem = () => {
                if (!newItem.name.trim()) return;
                const updated = [{ ...newItem, id: Date.now() }, ...inventory];
                setInventory(updated);
                localStorage.setItem('golden-lunchbox-data', JSON.stringify(updated));
                setNewItem({ name: '', days: 3 });
            };

            const deleteItem = (id) => {
                const updated = inventory.filter(i => i.id !== id);
                setInventory(updated);
                localStorage.setItem('golden-lunchbox-data', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-white border-b border-amber-200 sticky top-0 z-50 px-6 py-6 shadow-sm">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black text-amber-600 tracking-tighter flex items-center gap-2 uppercase leading-none">
                                    <IconLunchbox /> THE GOLDEN LUNCHBOX
                                </h1>
                                <p className="text-[10px] font-bold text-amber-400 uppercase tracking-widest mt-2">
                                    {loading ? '🔄 Syncing...' : '✨ Live Library'}
                                </p>
                            </div>
                            <div className="bg-amber-500 text-white p-2.5 rounded-2xl shadow-lg ring-2 ring-white cursor-pointer" onClick={fetchData}>
                                <IconCheck />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-5 space-y-8">
                        {activeTab === 'fridge' && (
                            <section className="space-y-6 animate-fade">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-amber-100">
                                    <label className="block text-xs font-black text-amber-700 uppercase mb-4 tracking-widest px-1">Inventory Rescue</label>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input 
                                            type="text" 
                                            placeholder="What's expiring? (e.g. Yams)"
                                            className="flex-1 bg-neutral-50 rounded-2xl px-6 py-4 text-sm font-bold outline-none border-2 border-amber-100 focus:border-amber-500 transition-all text-neutral-800"
                                            value={newItem.name}
                                            onChange={e => setNewItem({...newItem, name: e.target.value})}
                                            onKeyPress={e => e.key === 'Enter' && addItem()}
                                        />
                                        <button onClick={addItem} className="bg-amber-500 text-white font-black py-4 px-8 rounded-2xl shadow-lg flex items-center justify-center gap-2 uppercase text-[11px] tracking-widest">
                                            Log Item
                                        </button>
                                    </div>
                                </div>
                                <div className="grid gap-3">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-[2.2rem] flex items-center justify-between border border-amber-50">
                                            <div className="flex items-center gap-4">
                                                <div className="w-1.5 h-10 rounded-full bg-gradient-to-b from-amber-400 to-amber-600"></div>
                                                <p className="font-black text-neutral-800 text-base">{item.name}</p>
                                            </div>
                                            <button onClick={() => deleteItem(item.id)} className="p-2.5 text-neutral-300 hover:text-red-500"><IconTrash /></button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {activeTab === 'recipes' && (
                            <section className="space-y-6 animate-fade">
                                <div className="px-2 flex justify-between items-end">
                                    <div>
                                        <h2 className="text-2xl font-black text-neutral-800 tracking-tighter uppercase leading-none">Library</h2>
                                        <p className="text-amber-500 text-[10px] font-black uppercase tracking-widest mt-2">Recipes found: {recipes.length}</p>
                                    </div>
                                    <button onClick={fetchData} className="text-[10px] font-black uppercase text-neutral-400 hover:text-amber-500 transition-colors underline decoration-2 underline-offset-4">Refresh Data</button>
                                </div>

                                {error && (
                                    <div className="p-6 bg-red-50 border border-red-100 rounded-3xl text-red-600 text-sm font-bold text-center">
                                        ⚠️ Error: {error} <br/>
                                        <span className="text-[10px] font-normal opacity-70">Check if your spreadsheet is Published to Web as CSV.</span>
                                    </div>
                                )}

                                <div className="grid gap-5">
                                    {recipes.map(recipe => (
                                        <div key={recipe.id} className="bg-white p-8 rounded-[3rem] border border-amber-50 shadow-sm relative overflow-hidden group hover:shadow-2xl transition-all">
                                            {recipe.isPremium && <div className="absolute top-4 right-4 bg-amber-500 text-white text-[8px] font-black px-3 py-1 rounded-full shadow-lg">PREMIUM</div>}
                                            <div className="flex gap-2 mb-4">
                                                {recipe.tags.map(tag => <span key={tag} className="text-[9px] bg-amber-50 text-amber-600 px-3 py-1 rounded-full font-black uppercase tracking-tighter">{tag}</span>)}
                                            </div>
                                            <h3 className="font-black text-xl text-neutral-800 leading-tight">{recipe.title}</h3>
                                            <p className="text-neutral-500 text-sm mt-4 leading-relaxed font-medium">"{recipe.instructions}"</p>
                                            <div className="mt-6 pt-6 border-t border-amber-50 flex items-center justify-between text-neutral-400">
                                                <span className="text-[10px] font-black uppercase tracking-widest italic font-bold tracking-tighter">Prep: {recipe.time}</span>
                                                <button className="text-amber-600 font-black text-[10px] uppercase tracking-widest bg-amber-50 px-5 py-2 rounded-full">Guide</button>
                                            </div>
                                        </div>
                                    ))}
                                    {recipes.length === 0 && !loading && !error && (
                                        <div className="py-20 text-center border-2 border-dashed border-neutral-200 rounded-[3rem] opacity-30">
                                            <p className="text-neutral-400 font-black text-sm uppercase tracking-widest italic">No recipes found in your sheet.</p>
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}

                        {activeTab === 'sales' && (
                            <section className="space-y-6 animate-fade text-center">
                                <div className="bg-amber-500 p-10 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden">
                                    <h2 className="text-3xl font-black mb-3 italic tracking-tighter uppercase leading-none">Sale Radar</h2>
                                    <div className="bg-white/10 backdrop-blur-xl p-8 rounded-[2rem] border border-white/20 mt-8 flex justify-between items-center shadow-inner">
                                        <p className="text-2xl font-black uppercase tracking-tighter leading-none">Yams & Squash</p>
                                        <div className="bg-white text-amber-500 px-6 py-3 rounded-2xl font-black text-[11px] shadow-lg tracking-widest">ON SALE</div>
                                    </div>
                                </div>
                            </section>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-2xl border border-amber-100 p-3 flex gap-2 rounded-[2.8rem] shadow-2xl z-[100] ring-8 ring-amber-500/5">
                        <button onClick={() => setActiveTab('fridge')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'fridge' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300 hover:text-amber-500'}`}>
                            <IconCheck />{activeTab === 'fridge' && <span className="font-black text-[10px] tracking-widest uppercase">Rescue</span>}
                        </button>
                        <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'recipes' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300 hover:text-amber-500'}`}>
                            <IconBook />{activeTab === 'recipes' && <span className="font-black text-[10px] tracking-widest uppercase">Library</span>}
                        </button>
                        <button onClick={() => setActiveTab('sales')} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'sales' ? 'bg-amber-500 text-white shadow-xl scale-105' : 'text-amber-300 hover:text-amber-500'}`}>
                            <IconLunchbox />{activeTab === 'sales' && <span className="font-black text-[10px] tracking-widest uppercase font-black leading-none">Sales</span>}
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
