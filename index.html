<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox | Family Legacy</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FDFBFA; 
            color: #2D241E;
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, .serif { font-family: 'Cormorant Garamond', serif; }

        /* 🖼️ SMART FRAME SYSTEM */
        .recipe-image-container {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            border-radius: 3rem 3rem 0 0;
            background: #EFE9E4;
        }
        @media (min-width: 768px) {
            .recipe-image-container { height: 450px; }
        }

        .recipe-image {
            width: 100%;
            height: 125%; 
            object-fit: cover;
            object-position: center top; 
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recipe-card:hover .recipe-image { transform: scale(1.08); }

        /* 🧾 RECEIPT STYLE */
        .receipt-card {
            background: white;
            border: 1px solid #f1f1f1;
            position: relative;
            border-radius: 2.5rem 2.5rem 0 0;
            text-align: center;
        }
        .receipt-card::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: linear-gradient(-45deg, transparent 5px, white 5px), linear-gradient(45deg, transparent 5px, white 5px);
            background-size: 10px 10px;
        }

        .instruction-text { 
            white-space: pre-line; 
            word-wrap: break-word; 
            overflow-wrap: break-word;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .nav-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .animate-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Stable SVG Icons ---
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconHeart = ({ fill = "none" }) => <svg width="18" height="18" viewBox="0 0 24 24" fill={fill} stroke={fill === 'none' ? 'currentColor' : 'none'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
        const IconChef = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M6 13.81c.62 1.51 2.12 2.19 3 2.19h6c.88 0 2.38-.68 3-2.19V11h-12v2.81z"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconBook = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconRadar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M12 12l4 4"/></svg>;
        const IconShop = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const IconSparkles = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-amber-500"><path d="M12 3l1.912 5.813L21 10.725l-5.813 1.912L12 21l-1.912-5.813L3 13.275l5.813-1.912L12 3z"/></svg>;
        const IconBasket = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-2 text-amber-600/40"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const IconStove = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block mr-2 text-amber-600/40"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('library');
            const [searchQuery, setSearchQuery] = useState('');
            const [userRecipes, setUserRecipes] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showAddRecipe, setShowAddRecipe] = useState(false);
            const [newRecipe, setNewRecipe] = useState({ title: '', instructions: '', secret: '', forKids: false });

            // 🛠️ GOOGLE DRIVE IMAGE FIXER
            const fixImageUrl = (url) => {
                if (!url) return "";
                let u = url.trim();
                if (u.includes('drive.google.com')) {
                    let id = "";
                    if (u.includes('/file/d/')) {
                        id = u.split('/file/d/')[1].split('/')[0];
                    } else if (u.includes('id=')) {
                        id = u.split('id=')[1].split('&')[0];
                    }
                    if (id) return `https://lh3.googleusercontent.com/u/0/d/${id}=w1200`;
                }
                return u;
            };

            const syncData = async () => {
                setLoading(true);
                try {
                    const [resR, resS] = await Promise.all([
                        fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv"),
                        fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_-MLitKb9cTRAD5rtiw9Vi9MscUEPIIQG7wKIPpzUI8AwYI84tuz3NVtez-6z6xjFG6ZySgRYClQg/pub?output=csv")
                    ]);
                    
                    const textR = await resR.text();
                    const textS = await resS.text();

                    const parseRows = (text) => text.split('\n').map(row => {
                        const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                        return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
                    });

                    const rData = parseRows(textR);
                    const rHeaders = (rData[0] || []).map(h => h.toLowerCase());
                    const findIdx = (headers, nicks) => headers.findIndex(h => nicks.some(n => h.includes(n)));

                    setRecipes(rData.slice(1).map((r, i) => ({
                        id: i,
                        title: r[findIdx(rHeaders, ['title', 'name'])] || "Golden Harvest",
                        info: r[findIdx(rHeaders, ['recipes', 'instructions', 'info', 'method'])] || "",
                        image: fixImageUrl(r[findIdx(rHeaders, ['image', 'photo', 'img', 'url', 'picture'])] || ""),
                        secret: r[findIdx(rHeaders, ['secret', 'tip', 'hack'])] || "",
                        tags: (r[findIdx(rHeaders, ['tags', 'category'])] || "Rescue").split('|')
                    })));

                    const sData = parseRows(textS);
                    const sHeaders = (sData[0] || []).map(h => h.toLowerCase());
                    setSales(sData.slice(1).map((s, i) => ({
                        id: i,
                        item: s[findIdx(sHeaders, ['item', 'name', 'product'])] || "Market Find",
                        location: s[findIdx(sHeaders, ['location', 'where', 'store'])] || "Local",
                        tip: s[findIdx(sHeaders, ['tip', 'note', 'desc'])] || "",
                        image: fixImageUrl(s[findIdx(sHeaders, ['image', 'photo', 'img', 'url'])] || "")
                    })));

                } catch (e) { console.error("Sync issue:", e); } finally { setLoading(false); }
            };

            useEffect(() => {
                const saved = localStorage.getItem('gl-legacy-html-v19');
                if (saved) setUserRecipes(JSON.parse(saved));
                syncData();
            }, []);

            const filteredRecipes = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return recipes.filter(r => r.title.toLowerCase().includes(q) || r.info.toLowerCase().includes(q));
            }, [recipes, searchQuery]);

            const saveLegacy = () => {
                if (!newRecipe.title.trim()) return;
                const updated = [{ ...newRecipe, id: Date.now(), date: new Date().toLocaleDateString() }, ...userRecipes];
                setUserRecipes(updated);
                localStorage.setItem('gl-legacy-html-v19', JSON.stringify(updated));
                setNewRecipe({ title: '', instructions: '', secret: '', forKids: false });
                setShowAddRecipe(false);
            };

            return (
                <div className="min-h-screen pb-40">
                    <header className="sticky top-0 z-[60] bg-[#FDFBFA]/95 backdrop-blur-xl border-b border-stone-100 p-6 md:p-10 text-center">
                        <div className="max-w-2xl mx-auto space-y-6">
                            <div className="space-y-2">
                                <h1 className="text-4xl md:text-5xl font-bold text-amber-600 tracking-tighter uppercase leading-none italic">Golden<br/>Lunchbox</h1>
                                <div className="flex justify-center">
                                    <span className="text-[10px] font-bold bg-amber-50 text-amber-600 px-4 py-1 rounded-full uppercase tracking-[0.3em] border border-amber-100">
                                        {loading ? "Gathering..." : "Legacy Active"}
                                    </span>
                                </div>
                            </div>
                            
                            {(activeTab === 'library' || activeTab === 'kitchen') && (
                                <div className="relative max-w-sm mx-auto group">
                                    <div className="absolute left-6 top-1/2 -translate-y-1/2 text-stone-300"><IconSearch /></div>
                                    <input type="text" placeholder="Find a recipe..." className="w-full bg-stone-100/50 border border-stone-100 rounded-full py-4 pl-14 pr-8 font-medium text-sm outline-none focus:ring-4 focus:ring-amber-500/5 focus:bg-white transition-all text-center" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 pt-10 space-y-16">
                        {/* --- KITCHEN TAB --- */}
                        {activeTab === 'kitchen' && (
                            <div className="animate-up space-y-12 text-center">
                                <div className="bg-stone-900 text-white p-12 md:p-16 rounded-[3.5rem] shadow-2xl relative overflow-hidden">
                                    <h2 className="text-4xl md:text-5xl font-bold italic mb-2 text-white">My Legacy</h2>
                                    <p className="text-stone-400 text-[10px] mb-10 italic tracking-[0.3em] uppercase">Building for the family.</p>
                                    <button onClick={() => setShowAddRecipe(!showAddRecipe)} className="bg-amber-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-[10px] shadow-2xl active:scale-95 transition-all">
                                        {showAddRecipe ? "Close" : "New Recipe Entry"}
                                    </button>
                                </div>
                                {showAddRecipe && (
                                    <div className="bg-white p-8 md:p-12 rounded-[4rem] shadow-xl border border-stone-100 space-y-8 animate-up">
                                        <input className="w-full bg-stone-50 p-6 rounded-2xl outline-none font-bold text-center text-xl" placeholder="Recipe Title" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} />
                                        <textarea className="w-full bg-stone-50 p-8 rounded-3xl outline-none h-48 text-center text-stone-600 text-base leading-relaxed italic" placeholder="Describe the budget rescue process..." value={newRecipe.instructions} onChange={e => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                                        <div className="flex justify-center py-2">
                                            <label className="flex items-center gap-4 cursor-pointer group">
                                                <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${newRecipe.forKids ? 'bg-red-500 border-red-500 scale-110 shadow-lg shadow-red-100' : 'border-stone-200'}`}>
                                                    {newRecipe.forKids && <IconHeart fill="white" />}
                                                </div>
                                                <input type="checkbox" className="hidden" checked={newRecipe.forKids} onChange={(e) => setNewRecipe({...newRecipe, forKids: e.target.checked})} />
                                                <span className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Mark as Kid's Favorite</span>
                                            </label>
                                        </div>
                                        <button onClick={saveLegacy} className="w-full bg-stone-900 text-white py-6 rounded-full font-bold uppercase text-[11px] tracking-[0.4em] shadow-xl">Save to Legacy</button>
                                    </div>
                                )}
                                <div className="grid gap-12">
                                    {userRecipes.map(r => (
                                        <div key={r.id} className="receipt-card p-10 md:p-14 shadow-sm animate-up bg-white border border-stone-50">
                                            <div className="space-y-8">
                                                <div className="space-y-3">
                                                    <div className="flex justify-center gap-3 items-center">
                                                        <span className="text-[10px] font-bold uppercase tracking-widest text-amber-500/40">{r.date}</span>
                                                        {r.forKids && <span className="text-[10px] font-bold text-red-500 uppercase tracking-widest flex items-center gap-2 bg-red-50 px-3 py-0.5 rounded-full"><IconHeart fill="currentColor" /> Kids Choice</span>}
                                                    </div>
                                                    <h4 className="text-4xl font-bold italic text-stone-800 leading-tight">{r.title}</h4>
                                                </div>
                                                
                                                <div className="space-y-6">
                                                    <h5 className="text-[11px] font-bold text-stone-300 uppercase tracking-[0.3em] flex items-center justify-center border-b border-stone-50 pb-3 max-w-[160px] mx-auto">
                                                        <IconStove /> The Method
                                                    </h5>
                                                    <p className="instruction-text text-stone-600 italic text-lg leading-relaxed px-2 md:px-6">"{r.instructions}"</p>
                                                </div>

                                                <div className="pt-4 flex justify-center opacity-20 hover:opacity-100 transition-opacity">
                                                    <button onClick={() => {const u = userRecipes.filter(x => x.id !== r.id); setUserRecipes(u); localStorage.setItem('gl-legacy-html-v19', JSON.stringify(u));}} className="text-stone-300 hover:text-red-400 transition-all p-4"><IconTrash /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- LIBRARY TAB --- */}
                        {activeTab === 'library' && (
                            <div className="animate-up space-y-16 text-center">
                                {filteredRecipes.length > 0 ? filteredRecipes.map((r, i) => (
                                    <div key={i} className="recipe-card bg-white rounded-[4rem] shadow-sm overflow-hidden border border-stone-100 group transition-all duration-700 hover:shadow-2xl">
                                        <div className="recipe-image-container">
                                            {r.image ? (
                                                <img 
                                                    src={r.image} 
                                                    alt={r.title} 
                                                    className="recipe-image" 
                                                    onError={(e) => {
                                                        e.target.onerror = null;
                                                        e.target.style.display = 'none';
                                                        e.target.parentNode.style.background = 'linear-gradient(135deg, #FDFBFA 0%, #EFE9E4 100%)';
                                                    }}
                                                />
                                            ) : (
                                                <div className="w-full h-full bg-amber-50 flex items-center justify-center italic text-amber-200 text-xl"><IconChef /></div>
                                            )}
                                            <div className="absolute top-10 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl px-6 py-2 rounded-full shadow-xl border border-white/50 flex items-center gap-3">
                                                <IconSparkles />
                                                <p className="text-[10px] font-bold text-amber-600 uppercase tracking-[0.3em] italic">Rescue Goal</p>
                                            </div>
                                        </div>
                                        <div className="p-10 md:p-16 space-y-12">
                                            <div className="space-y-4">
                                                <div className="flex justify-center gap-3">
                                                    {r.tags.map(t => <span key={t} className="text-[10px] bg-stone-50 text-stone-400 px-4 py-1.5 rounded-full font-bold uppercase tracking-widest border border-stone-100 italic">#{t}</span>)}
                                                </div>
                                                <h3 className="text-5xl md:text-6xl font-bold text-stone-800 leading-[1.1] tracking-tight">{r.title}</h3>
                                            </div>

                                            <div className="space-y-10">
                                                <div className="space-y-6">
                                                    <h5 className="text-[11px] font-bold text-stone-300 uppercase tracking-[0.4em] flex items-center justify-center">
                                                        <IconStove /> Instructions
                                                    </h5>
                                                    <div className="bg-stone-50/50 p-10 md:p-14 rounded-[3.5rem] border border-stone-100 shadow-inner relative max-w-xl mx-auto">
                                                        <p className="instruction-text text-stone-700 italic text-xl md:text-2xl leading-relaxed font-medium">"{r.info}"</p>
                                                    </div>
                                                </div>
                                            </div>

                                            {r.secret && (
                                                <div className="bg-amber-600 p-12 rounded-[3.5rem] text-white shadow-2xl max-w-md mx-auto relative overflow-hidden group-hover:scale-105 transition-transform duration-500">
                                                    <div className="absolute -right-6 -top-6 opacity-10 rotate-12 scale-150"><IconSparkles /></div>
                                                    <h6 className="text-[10px] font-bold text-amber-200 uppercase tracking-[0.4em] mb-4 italic flex justify-center items-center gap-2"><IconChef /> The Curator's Secret</h6>
                                                    <p className="text-2xl md:text-3xl font-bold italic leading-tight">"{r.secret}"</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )) : <div className="text-center py-40 opacity-20 italic font-bold text-stone-300 text-3xl uppercase tracking-widest">Harvest Empty...</div>}
                            </div>
                        )}

                        {/* --- RADAR TAB (SALES) --- */}
                        {activeTab === 'radar' && (
                            <div className="animate-up space-y-16 text-center">
                                <div className="p-16 rounded-[4rem] bg-stone-900 text-white text-center shadow-2xl relative overflow-hidden">
                                    <h2 className="text-4xl md:text-5xl font-bold italic mb-4">Budget Radar</h2>
                                    <p className="text-amber-400 text-[10px] font-bold uppercase tracking-[0.5em] italic">Neighborhood Watch</p>
                                </div>
                                <div className="grid gap-12">
                                    {sales.map((s, i) => (
                                        <div key={i} className="bg-white rounded-[4.5rem] shadow-sm overflow-hidden border border-stone-100 animate-up transition-all hover:shadow-xl">
                                            {s.image && (
                                                <div className="recipe-image-container h-64 md:h-80">
                                                    <img src={s.image} alt={s.item} className="recipe-image" />
                                                </div>
                                            )}
                                            <div className="p-12 md:p-16 space-y-8">
                                                <div className="flex justify-center items-center gap-4">
                                                    <span className="text-[10px] font-bold bg-amber-50 text-amber-600 px-6 py-2 rounded-full border border-amber-100 uppercase tracking-[0.2em] italic">Live Deal</span>
                                                    <span className="text-[11px] font-bold text-stone-400 uppercase italic">📍 {s.location}</span>
                                                </div>
                                                <h3 className="text-4xl md:text-5xl font-bold text-stone-800 leading-none">{s.item}</h3>
                                                {s.tip && (
                                                    <div className="space-y-6 border-t border-stone-50 pt-10 mt-6">
                                                        <h5 className="text-[11px] font-bold text-stone-200 uppercase tracking-[0.4em] flex items-center justify-center">
                                                            <IconBasket /> Shopping Tip
                                                        </h5>
                                                        <p className="instruction-text text-stone-500 italic text-xl md:text-2xl">"{s.tip}"</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- BOUTIQUE TAB --- */}
                        {activeTab === 'boutique' && (
                            <div className="animate-up space-y-16 text-center px-4">
                                <div className="space-y-8">
                                    <h2 className="text-6xl md:text-7xl font-bold italic">Boutique</h2>
                                    <p className="text-stone-400 text-[11px] uppercase tracking-[0.8em] font-bold italic px-8">Purpose Over Price</p>
                                    <div className="max-w-lg mx-auto p-12 bg-amber-50 rounded-[4rem] border border-amber-100 shadow-sm">
                                        <p className="text-xl text-amber-900 italic leading-relaxed font-semibold">
                                            "I built this for my kids and for every family on a strict budget. We start with a forgotten squash and build a golden legacy."
                                        </p>
                                    </div>
                                </div>
                                <div className="grid gap-12">
                                    <div className="bg-white p-16 rounded-[5rem] border border-stone-100 shadow-sm hover:border-amber-200 transition-all">
                                        <div className="flex flex-col items-center mb-8">
                                            <h3 className="text-4xl font-bold text-stone-800 italic mb-4">Harvest VIP</h3>
                                            <span className="text-[10px] bg-amber-600 text-white px-6 py-2 rounded-full font-bold uppercase tracking-[0.3em]">Full Access Hub</span>
                                        </div>
                                        <p className="text-stone-500 text-lg mb-12 font-medium leading-relaxed italic px-6">"Unlock private recipe guides and full boutique library for less than a coffee."</p>
                                        <button className="w-full max-w-sm mx-auto block bg-stone-900 text-white py-6 rounded-full font-bold uppercase text-[11px] tracking-[0.5em] shadow-2xl hover:bg-black transition-colors">Join for $9/mo</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- Centered Symmetrical Navigation Dock --- */}
                    <nav className="fixed bottom-12 left-1/2 -translate-x-1/2 nav-glass p-4 flex gap-6 md:gap-10 rounded-full shadow-[0_30px_60px_rgba(0,0,0,0.15)] z-[100] border-2 border-white scale-90 md:scale-100">
                        <button onClick={() => {setActiveTab('kitchen'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'kitchen' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconChef /></button>
                        <button onClick={() => {setActiveTab('library'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'library' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconBook /></button>
                        <button onClick={() => {setActiveTab('radar'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'radar' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconRadar /></button>
                        <button onClick={() => {setActiveTab('boutique'); window.scrollTo(0,0);}} className={`flex items-center justify-center w-16 h-16 md:w-20 md:h-20 rounded-full transition-all duration-700 ${activeTab === 'boutique' ? 'bg-amber-600 text-white shadow-2xl scale-125' : 'text-stone-300 hover:text-stone-500'}`}><IconShop /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
