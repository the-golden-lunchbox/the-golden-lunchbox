<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for the app logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FCF9F1; 
            color: #451a03; 
            -webkit-tap-highlight-color: transparent; 
        }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for a clean look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconCheck = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
        );
        const IconBook = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );
        const IconSparkles = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-amber-400"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('fridge');
            const [inventory, setInventory] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [newItem, setNewItem] = useState('');
            const [loading, setLoading] = useState(false);

            const RECIPES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";

            const fetchRecipes = () => {
                setLoading(true);
                fetch(RECIPES_CSV)
                    .then(res => res.text())
                    .then(text => {
                        // Improved line splitting for CSVs
                        const rows = text.split(/\r?\n/).slice(1).filter(line => line.trim() !== "").map(r => {
                            const c = r.split(',');
                            return { 
                                title: c[1] || "Untitled Recipe", 
                                info: c[3] || "No details provided.",
                                prep: c[4] || "15m"
                            };
                        });
                        setRecipes(rows);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            };

            useEffect(() => {
                const saved = localStorage.getItem('golden-inventory');
                if (saved) setInventory(JSON.parse(saved));
                fetchRecipes();
            }, []);

            const addInv = () => {
                if(!newItem) return;
                const updated = [{ name: newItem, id: Date.now() }, ...inventory];
                setInventory(updated);
                localStorage.setItem('golden-inventory', JSON.stringify(updated));
                setNewItem('');
            };

            const removeInv = (id) => {
                const updated = inventory.filter(item => item.id !== id);
                setInventory(updated);
                localStorage.setItem('golden-inventory', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen pb-40">
                    <header className="p-8 border-b border-amber-100 bg-white/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black text-amber-600 uppercase tracking-tighter leading-none">The Golden Lunchbox</h1>
                                <p className="text-[10px] font-black text-amber-300 uppercase tracking-[0.2em] mt-2">Zero-Waste Kitchen Rescue</p>
                            </div>
                            <button onClick={fetchRecipes} className="bg-amber-500 text-white p-2.5 rounded-2xl shadow-lg active:scale-95 transition-all">
                                <IconCheck />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-6 space-y-12">
                        {activeTab === 'fridge' && (
                            <div className="animate-fade space-y-8">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-amber-900/5 border border-amber-50">
                                    <label className="block text-[10px] font-black text-amber-400 uppercase mb-4 tracking-widest px-1">Log Fridge Discovery</label>
                                    <div className="flex flex-col gap-4">
                                        <input 
                                            className="w-full bg-amber-50/50 p-5 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-amber-200 transition-all text-amber-900"
                                            placeholder="e.g. 1/2 Delicata Squash" 
                                            value={newItem} 
                                            onChange={e => setNewItem(e.target.value)}
                                            onKeyPress={e => e.key === 'Enter' && addInv()}
                                        />
                                        <button onClick={addInv} className="w-full bg-amber-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all">Log Item</button>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-amber-800/30 uppercase tracking-widest italic px-4">In Your Fridge</h3>
                                    <div className="grid gap-3">
                                        {inventory.map(i => (
                                            <div key={i.id} className="bg-white p-5 rounded-[2rem] border border-amber-50 shadow-sm flex items-center justify-between group">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-1.5 h-10 bg-gradient-to-b from-amber-300 to-amber-500 rounded-full"></div>
                                                    <p className="font-black text-neutral-800 text-lg">{i.name}</p>
                                                </div>
                                                <button onClick={() => removeInv(i.id)} className="p-2 text-neutral-200 hover:text-red-400 transition-colors">
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipes' && (
                            <div className="animate-fade space-y-8">
                                <div className="flex items-center gap-3 px-4">
                                    <IconSparkles />
                                    <h2 className="text-xs font-black text-amber-800 uppercase tracking-widest">Recipe Library</h2>
                                </div>
                                
                                {loading ? (
                                    <div className="py-20 text-center font-black text-amber-200 animate-pulse uppercase tracking-widest italic">Syncing with Google...</div>
                                ) : (
                                    <div className="space-y-8">
                                        {recipes.map((r, index) => (
                                            <div key={index} className="bg-white p-10 rounded-[3.5rem] border border-amber-50 shadow-xl shadow-amber-900/5 group hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-50 rounded-full -mr-16 -mt-16 group-hover:bg-amber-100 transition-colors"></div>
                                                
                                                <div className="relative">
                                                    <div className="flex items-center gap-2 mb-4">
                                                        <span className="text-[10px] font-black text-amber-500 bg-amber-50 px-3 py-1 rounded-full uppercase tracking-tighter">Kitchen Guide</span>
                                                        <span className="text-[10px] font-black text-neutral-300 uppercase tracking-widest italic">Prep: {r.prep}</span>
                                                    </div>
                                                    
                                                    <h3 className="font-black text-3xl text-neutral-800 leading-tight mb-6 group-hover:text-amber-600 transition-colors">{r.title}</h3>
                                                    
                                                    <div className="bg-amber-50/30 p-8 rounded-3xl border border-amber-50">
                                                        <p className="text-neutral-600 text-lg leading-relaxed italic font-medium">
                                                            "{r.info}"
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="mt-8 flex justify-end">
                                                        <button className="text-amber-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2 bg-amber-50 px-6 py-3 rounded-full group-hover:bg-amber-500 group-hover:text-white transition-all">
                                                            Read Full Guide
                                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-xl p-3 flex gap-4 rounded-[3rem] shadow-2xl border border-amber-100 ring-8 ring-amber-500/5 z-50">
                        <button onClick={() => setActiveTab('fridge')} className={`flex items-center gap-3 px-10 py-5 rounded-[2rem] transition-all duration-500 ${activeTab === 'fridge' ? 'bg-amber-500 text-white shadow-xl scale-110' : 'text-amber-200 hover:text-amber-400'}`}>
                            <IconCheck />
                            {activeTab === 'fridge' && <span className="font-black text-[11px] tracking-widest uppercase">Rescue</span>}
                        </button>
                        <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-3 px-10 py-5 rounded-[2rem] transition-all duration-500 ${activeTab === 'recipes' ? 'bg-amber-500 text-white shadow-xl scale-110' : 'text-amber-200 hover:text-amber-400'}`}>
                            <IconBook />
                            {activeTab === 'recipes' && <span className="font-black text-[11px] tracking-widest uppercase font-black leading-none">Library</span>}
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
