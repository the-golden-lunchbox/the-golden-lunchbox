```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Lunchbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FCF9F1; color: #451a03; -webkit-tap-highlight-color: transparent; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        img { object-fit: cover; width: 100%; height: 200px; border-radius: 1.5rem; background-color: #fef3c7; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'golden-lunchbox';

        window.FirebaseAPI = { auth, db, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, appId, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconCheck = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>;
        const IconBook = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('fridge');
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [communitySales, setCommunitySales] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newItem, setNewItem] = useState('');
            const [isPosting, setIsPosting] = useState(false);
            const [showSaleForm, setShowSaleForm] = useState(false);
            const [saleInput, setSaleInput] = useState({ item: '', location: '', tip: '' });

            const RECIPES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4iXHyFAKYN3GNrZofAkI_GZOX2K20b5JKK3zb_EPO_PKIk1E1fw_5Wu894LP9qup1Bt-6Rq56oMAv/pub?gid=0&single=true&output=csv";

            // 1. Auth Logic
            useEffect(() => {
                const initAuth = async () => {
                    const { auth, signInAnonymously, onAuthStateChanged } = window.FirebaseAPI;
                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, setUser);
                };
                initAuth();
            }, []);

            // 2. Fetch Spreadsheet Recipes
            useEffect(() => {
                const fetchRecipes = async () => {
                    try {
                        const res = await fetch(RECIPES_CSV);
                        const text = await res.text();
                        const rows = text.split('\n').slice(1).map(row => {
                            const cols = row.split(',');
                            return { id: cols[0], title: cols[1], tags: (cols[2] || "").split('|'), instructions: cols[3], time: cols[4] };
                        });
                        setRecipes(rows);
                    } catch (e) { console.error("CSV Error", e); }
                };
                fetchRecipes();
            }, []);

            // 3. Sync Data with Cloud (Firestore)
            useEffect(() => {
                if (!user) return;
                const { db, collection, onSnapshot, appId } = window.FirebaseAPI;

                // Sync Private Fridge
                const fridgeRef = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                const unsubFridge = onSnapshot(fridgeRef, (snap) => {
                    setInventory(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // Sync Public Sales
                const salesRef = collection(db, 'artifacts', appId, 'public', 'data', 'sales');
                const unsubSales = onSnapshot(salesRef, (snap) => {
                    setCommunitySales(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });

                return () => { unsubFridge(); unsubSales(); };
            }, [user]);

            const addInventoryItem = async () => {
                if (!newItem.trim() || !user) return;
                const { db, collection, addDoc, appId } = window.FirebaseAPI;
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'inventory'), {
                    name: newItem,
                    createdAt: Date.now()
                });
                setNewItem('');
            };

            const removeInventoryItem = async (id) => {
                const { db, doc, deleteDoc, appId } = window.FirebaseAPI;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', id));
            };

            const postSale = async () => {
                if (!saleInput.item || !saleInput.location || !user) return;
                setIsPosting(true);
                const { db, collection, addDoc, appId } = window.FirebaseAPI;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), {
                    ...saleInput,
                    postedBy: user.uid,
                    createdAt: Date.now()
                });
                setSaleInput({ item: '', location: '', tip: '' });
                setShowSaleForm(false);
                setIsPosting(false);
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-white border-b border-amber-100 p-6 sticky top-0 z-50 shadow-sm">
                        <h1 className="text-xl font-black text-amber-600 tracking-tighter uppercase text-center">The Golden Lunchbox</h1>
                        <p className="text-[10px] text-center font-bold text-amber-400 uppercase tracking-widest mt-1">
                            {user ? "✨ Live & Connected" : "Connecting..."}
                        </p>
                    </header>

                    <main className="max-w-xl mx-auto p-5 space-y-6">
                        {activeTab === 'fridge' && (
                            <section className="space-y-4 animate-fade">
                                <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-amber-50">
                                    <label className="block text-[10px] font-black text-amber-700 uppercase mb-3 px-1 italic">Log Fridge Discovery</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type="text" placeholder="e.g. Bag of Yams"
                                            className="flex-1 bg-neutral-50 rounded-xl px-4 py-3 text-sm font-bold outline-none border-2 border-transparent focus:border-amber-200"
                                            value={newItem} onChange={e => setNewItem(e.target.value)}
                                            onKeyPress={e => e.key === 'Enter' && addInventoryItem()}
                                        />
                                        <button onClick={addInventoryItem} className="bg-amber-500 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-transform">
                                            <IconPlus />
                                        </button>
                                    </div>
                                </div>
                                <div className="grid gap-2">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-4 rounded-2xl flex items-center justify-between border border-amber-50 shadow-sm">
                                            <p className="font-bold text-neutral-800">{item.name}</p>
                                            <button onClick={() => removeInventoryItem(item.id)} className="text-neutral-300 hover:text-red-500"><IconTrash /></button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {activeTab === 'recipes' && (
                            <section className="space-y-4 animate-fade">
                                {recipes.map(recipe => (
                                    <div key={recipe.id} className="bg-white rounded-[2rem] border border-amber-50 shadow-sm overflow-hidden group">
                                        <div className="p-6">
                                            <h3 className="font-black text-lg text-neutral-800 leading-tight">{recipe.title}</h3>
                                            <p className="text-neutral-500 text-xs mt-2 italic leading-relaxed">"{recipe.instructions}"</p>
                                        </div>
                                    </div>
                                ))}
                            </section>
                        )}

                        {activeTab === 'sales' && (
                            <section className="space-y-4 animate-fade">
                                <div className="bg-amber-500 p-8 rounded-[2.5rem] text-white shadow-2xl text-center relative">
                                    <h2 className="text-2xl font-black italic tracking-tighter uppercase leading-none">Community Radar</h2>
                                    <p className="text-amber-100 text-[10px] font-bold uppercase tracking-widest mt-2 mb-4">Share a deal, help a mom</p>
                                    <button 
                                        onClick={() => setShowSaleForm(!showSaleForm)}
                                        className="bg-white text-amber-500 px-6 py-3 rounded-2xl font-black text-[11px] shadow-lg uppercase active:scale-95 transition-all"
                                    >
                                        {showSaleForm ? "Close Form" : "Share a Deal"}
                                    </button>
                                </div>

                                {showSaleForm && (
                                    <div className="bg-white p-6 rounded-[2rem] border-2 border-amber-100 shadow-xl space-y-3 animate-fade">
                                        <input 
                                            placeholder="Item Name (e.g. Half price Squash)" 
                                            className="w-full bg-neutral-50 rounded-xl px-4 py-3 text-sm font-bold border-2 border-transparent focus:border-amber-200 outline-none"
                                            value={saleInput.item} onChange={e => setSaleInput({...saleInput, item: e.target.value})}
                                        />
                                        <input 
                                            placeholder="Location (e.g. Walmart North)" 
                                            className="w-full bg-neutral-50 rounded-xl px-4 py-3 text-sm font-bold border-2 border-transparent focus:border-amber-200 outline-none"
                                            value={saleInput.location} onChange={e => setSaleInput({...saleInput, location: e.target.value})}
                                        />
                                        <input 
                                            placeholder="Note (e.g. Great for muffins!)" 
                                            className="w-full bg-neutral-50 rounded-xl px-4 py-3 text-sm font-bold border-2 border-transparent focus:border-amber-200 outline-none"
                                            value={saleInput.tip} onChange={e => setSaleInput({...saleInput, tip: e.target.value})}
                                        />
                                        <button 
                                            onClick={postSale} disabled={isPosting}
                                            className="w-full bg-amber-500 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all"
                                        >
                                            {isPosting ? "Posting..." : "Post Deal to Radar"}
                                        </button>
                                    </div>
                                )}

                                <div className="grid gap-3 pt-4">
                                    {communitySales.map(sale => (
                                        <div key={sale.id} className="bg-white p-6 rounded-[2rem] border border-amber-50 shadow-md">
                                            <div className="flex justify-between items-start mb-1">
                                                <h3 className="text-xl font-black text-neutral-800 uppercase tracking-tight">{sale.item}</h3>
                                                <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[9px] font-black uppercase">Active</span>
                                            </div>
                                            <p className="text-amber-500 text-[10px] font-black uppercase tracking-widest mb-3 italic">📍 {sale.location}</p>
                                            <p className="text-neutral-500 text-sm italic font-medium">"{sale.tip}"</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md border border-amber-100 p-2 flex gap-1 rounded-full shadow-2xl z-[100] ring-8 ring-amber-500/5">
                        <button onClick={() => setActiveTab('fridge')} className={`px-6 py-3 rounded-full transition-all ${activeTab === 'fridge' ? 'bg-amber-500 text-white shadow-lg scale-105' : 'text-amber-200'}`}><IconCheck /></button>
                        <button onClick={() => setActiveTab('recipes')} className={`px-6 py-3 rounded-full transition-all ${activeTab === 'recipes' ? 'bg-amber-500 text-white shadow-lg scale-105' : 'text-amber-200'}`}><IconBook /></button>
                        <button onClick={() => setActiveTab('sales')} className={`px-6 py-3 rounded-full transition-all ${activeTab === 'sales' ? 'bg-amber-500 text-white shadow-lg scale-105' : 'text-amber-200'}`}><IconPlus /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
